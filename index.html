                                            <p className="text-sm text-gray-500 mb-6 px-4">Bạn chỉ trả lời đúng {quizScore}/5 câu. Hệ thống phát hiện rủi ro bảo mật hoặc bạn không phải là thành viên hợp lệ.</p>
                                            <button onClick={() => setAuthView('select')} className="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold shadow-md hover:bg-black transition-colors">
                                                Thử Lại Từ Đầu
                                            </button>
                                        </>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                );
            }

            const renderTutorialGuide = () => {
                if (tutorialStep === 0) return null;

                let content = {};
                let positionClass = "";

                switch (tutorialStep) {
                    case 1:
                        content = { title: "Bước 1: Tìm chính mình!", text: "Hãy nhấp vào 'Mảnh ghép' của bạn ở danh sách bên dưới, hoặc dùng nút Tìm kiếm có hiệu ứng phát sáng nhé.", next: null };
                        positionClass = "top-[15%] md:top-[25%] left-1/2 -translate-x-1/2";
                        break;
                    case 2:
                        content = { title: "Bước 2: Cập nhật thông tin", text: "Tuyệt vời! Bây giờ hãy nhấn vào nút 'Sửa hồ sơ' đang phát sáng để bắt đầu cập nhật.", next: null };
                        positionClass = isMobile ? "top-[10%] left-1/2 -translate-x-1/2" : "top-[20%] left-[25%] -translate-x-1/2"; 
                        break;
                    case 3:
                        content = { title: "Bước 3: Thay áo mới", text: "Nhấp vào Ảnh Đại Diện để tải ảnh lên. Nhớ điền đầy đủ thông tin (ngoại trừ Tên đã được khóa), đặc biệt là Link Facebook nha!", next: 4 };
                        positionClass = "bottom-[10%] md:bottom-[15%] left-1/2 -translate-x-1/2";
                        break;
                    case 4:
                        content = { title: "Bước cuối: Khóa Ký Ức", text: "Tạo một mã PIN gồm 6 số bí mật để chốt hồ sơ. Nếu sau này muốn đổi ảnh, bạn phải dùng đúng mã PIN này nhé!", next: 0 };
                        positionClass = "top-[10%] md:top-[20%] left-1/2 -translate-x-1/2";
                        break;
                }

                return (
                    <div className="fixed inset-0 z-[1000] pointer-events-none flex items-center justify-center">
                        <div className="absolute inset-0 bg-black/40 backdrop-blur-[2px] transition-all duration-300"></div>
                        <div className={`absolute ${positionClass} w-[90%] max-w-[350px] pointer-events-auto transition-all duration-500 z-[1002]`}>
                            <div className="bg-white/95 backdrop-blur-xl border-[3px] border-rose-400 rounded-2xl p-4 shadow-[0_0_30px_rgba(244,63,94,0.4)] animate-slideUp relative">
                                <button onClick={() => setTutorialStep(0)} className="absolute -top-3 -right-3 w-8 h-8 bg-gray-800 text-white rounded-full border-2 border-white flex items-center justify-center hover:bg-rose-500 hover:scale-110 transition-transform shadow-md">
                                    <i className="fa-solid fa-xmark"></i>
                                </button>
                                <div className="flex gap-3 items-start">
                                    <div className="w-12 h-12 bg-rose-100 rounded-full flex items-center justify-center text-2xl shrink-0 border-2 border-rose-200 shadow-inner">
                                        <span className="animate-bounce block">✨</span>
                                    </div>
                                    <div>
                                        <h4 className="font-bold text-rose-600 mb-1 text-sm uppercase tracking-wide">{content.title}</h4>
                                        <p className="text-xs text-gray-700 leading-relaxed mb-3">{content.text}</p>
                                        {content.next !== null && (
                                            <button onClick={() => setTutorialStep(content.next)} className="bg-gradient-to-r from-rose-400 to-rose-500 text-white px-4 py-2 rounded-full text-xs font-bold shadow-md hover:scale-105 transition-transform flex items-center gap-2">
                                                {content.next === 0 ? "Đã hiểu! Bắt đầu thôi" : "Đã hiểu, Tiếp tục"} <i className="fa-solid fa-arrow-right"></i>
                                            </button>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };
            
            const renderEditForm = () => (
                <div className="w-full flex flex-col h-full max-h-full relative z-[1001]">
                    <div className="flex justify-between items-center mb-2 md:mb-4 border-b border-gray-200 pb-2 md:pb-3 shrink-0">
                        <h4 className="font-serif text-lg md:text-2xl text-gray-800">Cập nhật hồ sơ</h4>
                        
                        <div className="flex items-center gap-2">
                            {/* NÚT ADMIN: GỠ PIN */}
                            {isAdmin && selectedMember.pin && (
                                <button onClick={handleAdminResetPin} className="px-2 md:px-3 py-1 bg-rose-100 text-rose-600 hover:bg-rose-200 rounded-lg text-[10px] md:text-xs font-bold uppercase tracking-wider transition-colors border border-rose-200 flex items-center gap-1.5 shadow-sm">
                                    <i className="fa-solid fa-unlock-keyhole"></i> <span className="hidden md:inline">Admin:</span> Gỡ PIN
                                </button>
                            )}

                            {/* HIỂN THỊ NÚT ĐỔI MÃ PIN NẾU ĐÃ CÓ MÃ PIN */}
                            {selectedMember.pin && !isAdmin && (
                                <button onClick={() => {
                                    setPinConfig({ show: true, mode: 'change', error: '' });
                                    setPinInput1(''); setPinInput2(''); setPinInput3('');
                                }} className="px-3 py-1 bg-gray-100 text-gray-600 hover:text-rose-500 rounded-lg text-[10px] md:text-xs font-bold uppercase tracking-wider transition-colors border border-gray-200 flex items-center gap-1.5 shadow-sm">
                                    <i className="fa-solid fa-key"></i> Đổi Mã PIN
                                </button>
                            )}
                        </div>
                    </div>
                    
                    <div className={`flex justify-center mb-3 md:mb-5 relative group cursor-pointer w-16 h-16 md:w-24 md:h-24 mx-auto shrink-0 hover:scale-105 transition-all duration-300 ${tutorialStep === 3 ? 'tutorial-highlight' : ''}`}>
                        <div className="w-full h-full rounded-full overflow-hidden border-4 border-white shadow-md bg-gray-100 relative z-10">
                            <img src={editForm.avatar} className="w-full h-full object-cover" alt="preview"/>
                        </div>
                        <label className="absolute inset-0 bg-black/40 rounded-full flex flex-col items-center justify-center text-white opacity-0 group-hover:opacity-100 transition-opacity cursor-pointer z-20">
                            <i className="fa-solid fa-camera md:mb-1 text-[10px] md:text-sm"></i>
                            <span className="text-[7px] md:text-[9px] uppercase font-medium tracking-wider hidden md:block">Đổi ảnh</span>
                            <input type="file" accept="image/*" className="hidden" onChange={handleImageUpload}/>
                        </label>
                    </div>

                    <div className="space-y-2.5 md:space-y-3 text-sm font-sans mb-2 md:mb-4 flex-1 overflow-y-auto pr-1 hide-scrollbar">
                        <div className={tutorialStep === 3 ? 'relative z-10 bg-white' : ''}>
                            <label className="block text-[9px] md:text-[10px] uppercase tracking-wider text-gray-400 font-semibold mb-1 ml-1 flex justify-between items-center">
                                <span>Họ và Tên</span>
                                <span className="text-[8px] text-rose-400 font-bold tracking-widest bg-rose-50 px-2 py-0.5 rounded-full"><i className="fa-solid fa-lock"></i> Khóa</span>
                            </label>
                            <input type="text" value={editForm.name} readOnly title="Bạn không thể tự sửa tên trong danh sách" className="w-full bg-gray-100 text-gray-500 border border-gray-200 rounded-lg md:rounded-xl p-2 md:p-2.5 text-xs md:text-sm outline-none cursor-not-allowed shadow-inner font-medium" />
                        </div>
                        
                        <div className={tutorialStep === 3 ? 'relative z-10 bg-white' : ''}>
                            <label className="block text-[9px] md:text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1 ml-1">Lưu bút cá nhân</label>
                            <textarea rows="2" value={editForm.quote} onChange={e=>setEditForm({...editForm, quote: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg md:rounded-xl p-2 md:p-2.5 text-xs md:text-sm outline-none focus:border-rose-400 resize-none font-serif shadow-sm" />
                        </div>
                        
                        <div className={`${tutorialStep === 3 ? 'tutorial-highlight p-1 rounded-xl' : ''}`}>
                            <label className="block text-[9px] md:text-[10px] uppercase tracking-wider text-rose-500 font-bold mb-1 ml-1">Facebook Link (*)</label>
                            <input type="url" placeholder="https://fb.com/..." value={editForm.facebook || ''} onChange={e=>setEditForm({...editForm, facebook: e.target.value})} className="w-full bg-white border border-rose-300 rounded-lg md:rounded-xl p-2 md:p-2.5 text-xs md:text-sm outline-none focus:border-rose-500 transition-colors shadow-sm relative z-10" />
                        </div>
                        
                        <div className={`grid grid-cols-2 gap-2 ${tutorialStep === 3 ? 'relative z-10 bg-white' : ''}`}>
                            <div>
                                <label className="block text-[9px] md:text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1 ml-1">Instagram</label>
                                <input type="text" placeholder="@username hoặc link..." value={editForm.instagram || ''} onChange={e=>setEditForm({...editForm, instagram: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg md:rounded-xl p-2 md:p-2.5 text-[10px] md:text-xs outline-none focus:border-rose-400 transition-colors shadow-sm" />
                            </div>
                            <div>
                                <label className="block text-[9px] md:text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1 ml-1">TikTok</label>
                                <input type="text" placeholder="@username hoặc link..." value={editForm.tiktok || ''} onChange={e=>setEditForm({...editForm, tiktok: e.target.value})} className="w-full bg-white border border-gray-200 rounded-lg md:rounded-xl p-2 md:p-2.5 text-[10px] md:text-xs outline-none focus:border-rose-400 transition-colors shadow-sm" />
                            </div>
                        </div>
                        <div className={`pt-1 md:pt-2 ${tutorialStep === 3 ? 'relative z-10 bg-white' : ''}`}>
                            <label className="block text-[9px] md:text-[10px] uppercase tracking-wider text-gray-500 font-semibold mb-1 md:mb-2 ml-1 text-center">Màu Chủ Đạo</label>
                            <div className="flex gap-2 md:gap-3 justify-center">
                                {PROFILE_THEMES.map(theme => (
                                    <div key={theme.id} onClick={() => setEditForm({...editForm, theme: theme.id})} className={`w-5 h-5 md:w-6 md:h-6 rounded-full cursor-pointer transition-transform hover:scale-110 ${theme.bg} ${editForm.theme === theme.id ? 'ring-2 ring-offset-2 ring-gray-800' : 'shadow-sm'}`}/>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className={`mt-auto space-y-1.5 md:space-y-2 pt-2 border-t border-gray-200 shrink-0 pb-2 ${tutorialStep === 4 ? 'tutorial-highlight p-1.5 rounded-xl bg-white' : ''}`}>
                        {selectedMember.pin ? (
                            <button onClick={() => handleSaveProfile('save')} disabled={isUploading} className={`w-full py-3 text-white rounded-xl text-xs uppercase tracking-widest font-bold transition-all disabled:opacity-50 flex justify-center items-center gap-2 shadow-md relative z-10 ${isAdmin ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-gray-900 hover:bg-black'}`}>
                                {isUploading ? <i className="fa-solid fa-spinner fa-spin"></i> : <><i className="fa-solid fa-floppy-disk"></i> {isAdmin ? 'Lưu Hồ Sơ (Quyền Admin)' : 'Lưu & Tự Động Khóa'}</>}
                            </button>
                        ) : (
                            <>
                                <button onClick={() => handleSaveProfile('save')} disabled={isUploading} className={`w-full py-2.5 text-white rounded-xl text-xs uppercase tracking-widest font-semibold transition-colors disabled:opacity-50 flex justify-center items-center gap-2 relative z-10 ${isAdmin ? 'bg-indigo-500 hover:bg-indigo-600' : 'bg-gray-400 hover:bg-gray-500'}`}>
                                    {isUploading ? <i className="fa-solid fa-spinner fa-spin"></i> : <><i className="fa-solid fa-floppy-disk"></i> {isAdmin ? 'Lưu Hồ Sơ (Không khóa)' : 'Lưu Tạm Thời'}</>}
                                </button>
                                {!isAdmin && (
                                    <button onClick={() => handleSaveProfile('create_pin')} disabled={isUploading} className="w-full py-3 bg-rose-500 text-white rounded-xl text-xs uppercase tracking-widest hover:bg-rose-600 transition-all flex items-center justify-center gap-2 font-bold shadow-md shadow-rose-200 relative z-10">
                                        <i className="fa-solid fa-lock text-[10px]"></i> Tạo Mã PIN & Chốt Vĩnh Viễn
                                    </button>
                                )}
                            </>
                        )}
                    </div>
                </div>
            );

            const renderPinModal = () => {
                if (!pinConfig.show) return null;
                
                const { mode } = pinConfig;
                let title = '', desc = '', btnText = '';
                
                if (mode === 'create') {
                    title = "Tạo Mã PIN";
                    desc = "Tạo mã gồm 6 số để khóa hồ sơ. Sau này bạn sẽ dùng mã này để sửa thông tin.";
                    btnText = "Khóa Hồ Sơ";
                } else if (mode === 'unlock') {
                    title = "Nhập Mã PIN";
                    desc = "Hồ sơ đã bị khóa. Vui lòng nhập mã PIN để mở.";
                    btnText = "Mở Khóa";
                } else if (mode === 'change') {
                    title = "Đổi Mã PIN";
                    desc = "Nhập mã cũ và tạo mã mới của bạn.";
                    btnText = "Xác nhận Đổi";
                } else if (mode === 'reset_approved') {
                    title = "Yêu Cầu Được Duyệt!";
                    desc = "Admin đã phê duyệt yêu cầu của bạn. Vui lòng tạo mã PIN mới (6 số).";
                    btnText = "Lưu Mã Mới & Mở Khóa";
                }

                return (
                    <div className="fixed inset-0 z-[1050] flex items-center justify-center p-4">
                        <div className="absolute inset-0 bg-black/60 backdrop-blur-sm transition-opacity" onClick={() => setPinConfig({ show: false, mode: '', error: '' })}></div>
                        <div className="bg-white rounded-3xl p-6 md:p-8 w-full max-w-sm shadow-2xl relative z-10 animate-slideUp border border-white/50">
                            <button onClick={() => setPinConfig({ show: false, mode: '', error: '' })} className="absolute top-4 right-4 text-gray-400 hover:bg-gray-100 w-8 h-8 rounded-full flex items-center justify-center transition-colors"><i className="fa-solid fa-xmark"></i></button>
                            
                            <div className="text-center mb-6">
                                <div className={`w-14 h-14 rounded-full flex items-center justify-center text-2xl mx-auto mb-3 shadow-inner ${mode === 'reset_approved' ? 'bg-emerald-100 text-emerald-500' : 'bg-rose-100 text-rose-500'}`}>
                                    <i className={`fa-solid ${mode === 'reset_approved' ? 'fa-unlock' : 'fa-shield-halved'}`}></i>
                                </div>
                                <h3 className="text-xl font-bold text-gray-800">{title}</h3>
                                <p className="text-xs text-gray-500 mt-1">{desc}</p>
                            </div>

                            <form onSubmit={handlePinSubmit} className="space-y-4">
                                {mode === 'change' ? (
                                    <>
                                        <div>
                                            <input type="password" inputMode="numeric" maxLength="6" placeholder="Mã PIN Cũ (6 số)" value={pinInput1} onChange={e => setPinInput1(e.target.value.replace(/\D/g, ''))} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-center text-lg tracking-[0.5em] outline-none focus:border-rose-400 font-mono" autoFocus/>
                                        </div>
                                        <div>
                                            <input type="password" inputMode="numeric" maxLength="6" placeholder="Mã PIN Mới (6 số)" value={pinInput2} onChange={e => setPinInput2(e.target.value.replace(/\D/g, ''))} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-center text-lg tracking-[0.5em] outline-none focus:border-blue-400 font-mono" />
                                        </div>
                                        <div>
                                            <input type="password" inputMode="numeric" maxLength="6" placeholder="Xác nhận mã Mới" value={pinInput3} onChange={e => setPinInput3(e.target.value.replace(/\D/g, ''))} className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-center text-lg tracking-[0.5em] outline-none focus:border-blue-400 font-mono" />
                                        </div>
                                        
                                        {/* NÚT QUÊN MÃ PIN Ở MÀN HÌNH ĐỔI MÃ */}
                                        {!isAdmin && (
                                            selectedMember?.pinResetState === 'requested' ? (
                                                <div className="mt-3 p-2 bg-amber-50 rounded-xl border border-amber-100 flex items-center justify-center gap-2">
                                                    <i className="fa-solid fa-clock text-amber-500 animate-pulse"></i>
                                                    <span className="text-[10px] font-bold text-amber-600">Đang chờ Admin duyệt...</span>
                                                </div>
                                            ) : (
                                                <button type="button" onClick={handleForgotPin} className="w-full flex items-center justify-center gap-1.5 mt-2 text-[11px] font-bold text-rose-500 hover:text-rose-600 transition-colors">
                                                    <i className="fa-solid fa-circle-question"></i> Quên mã PIN cũ?
                                                </button>
                                            )
                                        )}
                                    </>
                                ) : mode === 'reset_approved' ? (
                                    <>
                                        <div>
                                            <input type="password" inputMode="numeric" maxLength="6" placeholder="Mã PIN Mới (6 số)" value={pinInput1} onChange={e => setPinInput1(e.target.value.replace(/\D/g, ''))} className="w-full px-4 py-3 bg-gray-50 border border-emerald-200 rounded-xl text-center text-lg tracking-[0.5em] outline-none focus:border-emerald-400 font-mono" autoFocus/>
                                        </div>
                                        <div>
                                            <input type="password" inputMode="numeric" maxLength="6" placeholder="Xác nhận mã Mới" value={pinInput2} onChange={e => setPinInput2(e.target.value.replace(/\D/g, ''))} className="w-full px-4 py-3 bg-gray-50 border border-emerald-200 rounded-xl text-center text-lg tracking-[0.5em] outline-none focus:border-emerald-400 font-mono" />
                                        </div>
                                    </>
                                ) : (
                                    <div>
                                        <input type="password" inputMode="numeric" maxLength="6" placeholder="• • • • • •" value={pinInput1} onChange={e => setPinInput1(e.target.value.replace(/\D/g, ''))} className="w-full px-4 py-4 bg-gray-50 border border-gray-200 rounded-xl text-center text-2xl tracking-[0.7em] outline-none focus:border-rose-400 focus:bg-white transition-colors font-mono font-bold text-gray-800 shadow-inner" autoFocus/>
                                        
                                        {/* NÚT YÊU CẦU QUÊN MÃ PIN CHO USER */}
                                        {mode === 'unlock' && !isAdmin && (
                                            selectedMember?.pinResetState === 'requested' ? (
                                                <div className="mt-4 p-3 bg-amber-50 rounded-xl border border-amber-100 flex items-center justify-center gap-2 shadow-inner">
                                                    <i className="fa-solid fa-clock text-amber-500 animate-pulse"></i>
                                                    <span className="text-xs font-bold text-amber-600">Đang chờ Admin duyệt...</span>
                                                </div>
                                            ) : (
                                                <button type="button" onClick={handleForgotPin} className="w-full flex items-center justify-center gap-2 mt-5 text-xs font-bold text-rose-500 hover:text-rose-600 transition-colors bg-rose-50 py-2.5 rounded-xl border border-rose-100 shadow-sm hover:shadow">
                                                    <i className="fa-solid fa-circle-question"></i> Quên mã PIN? Gửi yêu cầu
                                                </button>
                                            )
                                        )}
                                    </div>
                                )}

                                {pinConfig.error && <p className="text-xs text-rose-500 font-medium text-center animate-bounce"><i className="fa-solid fa-triangle-exclamation"></i> {pinConfig.error}</p>}

                                <button type="submit" disabled={isUploading} className={`w-full py-3 mt-2 text-white rounded-xl text-sm font-bold tracking-widest uppercase hover:shadow-lg transition-all shadow-md flex items-center justify-center gap-2 ${mode === 'reset_approved' ? 'bg-gradient-to-r from-emerald-400 to-emerald-500' : 'bg-gradient-to-r from-rose-400 to-rose-500'}`}>
                                    {isUploading ? <i className="fa-solid fa-spinner fa-spin"></i> : btnText}
                                </button>
                            </form>
                        </div>
                    </div>
                );
            };

            return (
                <div className="w-screen h-[100dvh] relative bg-[#fdfbfb]" onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
                    {userRole && (
                        <div className="fixed bottom-4 right-4 z-[900] flex flex-col gap-2 items-end">
                            
                            {/* NÚT THÔNG BÁO YÊU CẦU CHO ADMIN TRONG GIAO DIỆN APP */}
                            {isAdmin && members.filter(m => m.pinResetState === 'requested').length > 0 && (
                                <button onClick={() => setShowDashboard(true)} className="px-4 py-2 bg-rose-500 text-white text-xs font-bold rounded-full shadow-lg flex items-center gap-2 animate-bounce hover:scale-105 transition-transform">
                                    <i className="fa-solid fa-bell"></i> Có {members.filter(m => m.pinResetState === 'requested').length} yêu cầu
                                </button>
                            )}

                            {isAdmin && (
                                <button onClick={() => setShowDashboard(true)} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white text-[10px] font-bold uppercase tracking-widest rounded-full shadow-lg flex items-center gap-2 border border-indigo-400 transition-colors">
                                    <i className="fa-solid fa-arrow-left"></i> Về Dashboard Quản Trị
                                </button>
                            )}

                            <button onClick={() => { 
                                localStorage.removeItem('kyyeu_userRole'); 
                                setUserRole(null); 
                                setAuthView('select'); 
                                setSessionUnlockedMembers(new Set()); 
                            }} className="w-10 h-10 rounded-full bg-white/80 backdrop-blur border border-gray-200 text-gray-500 hover:text-rose-500 hover:border-rose-200 shadow-md flex items-center justify-center transition-all hover:scale-110 mt-1" title="Đăng xuất / Đổi vai trò">
                                <i className="fa-solid fa-right-from-bracket"></i>
                            </button>
                        </div>
                    )}

                    {renderTutorialGuide()}
                    {renderPinModal()}

                    <div className="absolute inset-0 z-0 pointer-events-none opacity-40" style={{ backgroundImage: 'radial-gradient(#f43f5e 1px, transparent 1px)', backgroundSize: '40px 40px' }}></div>
                    <div className="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] rounded-full bg-rose-200/40 blur-[100px] z-0 pointer-events-none transition-all duration-1000 ease-in-out"></div>
                    
                    {appSettings.isTimelineLocked && (
                        <div className="absolute top-4 left-1/2 -translate-x-1/2 z-[100] bg-gray-900/80 backdrop-blur-md text-white text-[10px] md:text-xs px-4 py-1.5 rounded-full shadow-lg flex items-center gap-2 animate-fadeIn border border-gray-700">
                            <i className="fa-solid fa-lock text-rose-400"></i> Kỷ yếu đã được niêm phong
                        </div>
                    )}

                    {showFirebaseError && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-fadeIn">
                            <div className="bg-white rounded-3xl p-6 md:p-8 max-w-lg w-full shadow-2xl relative">
                                <button onClick={() => setShowFirebaseError(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 transition-transform hover:scale-110"><i className="fa-solid fa-xmark text-xl"></i></button>
                                <div className="text-rose-500 mb-4 text-center"><i className="fa-solid fa-triangle-exclamation text-5xl"></i></div>
                                <h2 className="text-xl font-bold text-center mb-4">Cần cấu hình Database</h2>
                                <p className="text-sm text-gray-600 mb-4 leading-relaxed">Hệ thống không thể lưu trữ dữ liệu. Vui lòng sửa Firestore Rules thành:</p>
                                <div className="bg-gray-100 p-3 rounded-lg text-xs font-mono text-rose-500 mb-6 overflow-x-auto whitespace-pre-wrap">
                                    {`rules_version = '2';\nservice cloud.firestore {\n  match /databases/{database}/documents {\n    match /artifacts/cd12a3/public/data/{document=**} {\n      allow read, write: if true;\n    }\n  }\n}`}
                                </div>
                                <button onClick={() => setShowFirebaseError(false)} className="w-full py-3 bg-rose-500 text-white rounded-xl font-medium shadow-md shadow-rose-200 hover:scale-[1.02] transition-transform">Đã hiểu</button>
                            </div>
                        </div>
                    )}

                    {customDialog && (
                        <div className="fixed inset-0 z-[300] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-fadeIn">
                            <div className="bg-white/90 backdrop-blur-xl rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden border border-white/50 animate-slideUp">
                                <div className="p-6 text-center">
                                    <h3 className="text-lg font-semibold text-gray-800 mb-2">{customDialog.title}</h3>
                                    <p className="text-sm text-gray-500">{customDialog.message}</p>
                                </div>
                                <div className="flex border-t border-gray-200/60 p-2 gap-2">
                                    {customDialog.type === 'confirm' && <button onClick={() => setCustomDialog(null)} className="flex-1 py-2.5 bg-gray-100 text-gray-600 rounded-xl text-xs font-semibold hover:bg-gray-200 transition-colors">Hủy</button>}
                                    <button onClick={() => { if (customDialog.onConfirm) customDialog.onConfirm(); setCustomDialog(null); }} className="flex-1 py-2.5 bg-rose-500 text-white rounded-xl text-xs font-semibold hover:bg-rose-600 shadow-md shadow-rose-200">Xác nhận</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {selectedMedia && (
                        <div className="fixed inset-0 z-[700] flex items-center justify-center p-4 md:p-10 bg-black/95 backdrop-blur-lg animate-fadeIn" onClick={() => setSelectedMedia(null)}>
                            <button className="absolute top-6 right-6 md:top-10 md:right-10 text-white/50 hover:text-white text-3xl z-50 transition-transform hover:scale-110"><i className="fa-solid fa-xmark"></i></button>
                            <div className="w-full max-w-5xl h-full flex flex-col items-center justify-center animate-slideUp relative z-10" onClick={e => e.stopPropagation()}>
                                {selectedMedia.type === 'image' ? (
                                    <div className="relative inline-block max-w-full max-h-[85vh]">
                                        <div className="absolute inset-0 z-20"></div>
                                        <img src={selectedMedia.url} className="max-w-full max-h-[85vh] object-contain rounded-2xl shadow-2xl anti-theft-img" draggable="false" />
                                    </div>
                                ) : (
                                    <div className="w-full aspect-video rounded-2xl overflow-hidden shadow-2xl bg-black relative z-20">
                                        <iframe src={getEmbedUrl(selectedMedia.url)} className="w-full h-full border-0" allowFullScreen></iframe>
                                    </div>
                                )}
                                {selectedMedia.caption && <p className="mt-4 text-white text-lg font-cursive text-center drop-shadow-md relative z-20">{selectedMedia.caption}</p>}
                            </div>
                        </div>
                    )}

                    {showAddMedia && (!appSettings.isTimelineLocked || isAdmin) && !isGuest && (
                        <div className="fixed inset-0 z-[600] flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm animate-fadeIn">
                            <div className="bg-white/95 backdrop-blur-xl rounded-3xl w-full max-w-md shadow-2xl relative animate-slideUp p-5 md:p-6 border border-white/50">
                                <button onClick={() => setShowAddMedia(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-800 bg-gray-100/80 rounded-full w-8 h-8 flex items-center justify-center transition-transform hover:scale-110 shadow-sm z-10"><i className="fa-solid fa-xmark"></i></button>
                                <h3 className="font-serif text-xl md:text-2xl text-gray-800 mb-2 text-center">Thêm Mảnh Ghép</h3>
                                {isAdmin && appSettings.isTimelineLocked && <p className="text-[10px] text-indigo-500 font-bold text-center bg-indigo-50 py-1 mb-2 rounded-lg">Đăng ảnh bằng quyền Admin</p>}
                                <p className="text-center text-[10px] uppercase tracking-widest text-rose-500 mb-4 font-bold">{mediaForm.context === 'journey' ? 'Dành cho Hành Trình Lớp' : 'Dành cho Thước Phim Chung'}</p>
                                
                                {mediaForm.context !== 'journey' && (
                                    <div className="flex justify-center gap-2 mb-5">
                                        <span className="text-[10px] md:text-xs text-gray-500 font-medium py-1.5 px-2 bg-gray-100 rounded-lg flex items-center">Phân loại:</span>
                                        {['10A3', '11A3', '12A3'].map(g => (
                                            <button key={g} onClick={() => setMediaForm({...mediaForm, grade: g})} className={`px-3 py-1.5 rounded-lg text-[10px] md:text-xs font-bold transition-colors ${mediaForm.grade === g ? 'bg-rose-100 text-rose-600 border border-rose-200 shadow-sm' : 'bg-gray-50 text-gray-500 border border-gray-200 hover:bg-gray-100'}`}>
                                                {g}
                                            </button>
                                        ))}
                                    </div>
                                )}

                                <div className="flex flex-wrap justify-center gap-2 mb-4 pt-4 border-t border-gray-100">
                                    <button onClick={() => setMediaForm({...mediaForm, type: 'image', url: ''})} className={`px-4 py-2 rounded-full text-[10px] md:text-xs font-medium transition-colors flex items-center gap-2 ${mediaForm.type === 'image' ? 'bg-gray-800 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}><i className="fa-regular fa-image"></i> Ảnh từ máy</button>
                                    <button onClick={() => setMediaForm({...mediaForm, type: 'video', url: ''})} className={`px-4 py-2 rounded-full text-[10px] md:text-xs font-medium transition-colors flex items-center gap-2 ${mediaForm.type === 'video' ? 'bg-gray-800 text-white shadow-md' : 'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}><i className="fa-solid fa-link"></i> Link Video</button>
                                </div>
                                
                                {mediaForm.type === 'image' ? (
                                    <label className="flex flex-col items-center justify-center w-full h-36 md:h-40 border-2 border-dashed border-rose-200 rounded-2xl bg-gray-50 cursor-pointer hover:bg-rose-50 mb-4 transition-colors relative overflow-hidden group">
                                        {mediaForm.url ? <img src={mediaForm.url} className="w-full h-full object-contain bg-black/5" /> : (
                                            <div className="text-center">
                                                <div className="w-12 h-12 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center mx-auto mb-2 group-hover:scale-110 transition-transform"><i className="fa-solid fa-cloud-arrow-up text-xl"></i></div>
                                                <span className="text-xs md:text-sm text-gray-600 font-medium block">Chạm để chọn ảnh</span>
                                                <span className="text-[9px] md:text-[10px] text-gray-400 mt-1 block">Hỗ trợ JPG, PNG</span>
                                            </div>
                                        )}
                                        <input type="file" accept="image/*" className="hidden" onChange={(e) => { const file = e.target.files[0]; if (file) compressImage(file, (res) => setMediaForm({...mediaForm, url: res, type: 'image'})); }} />
                                    </label>
                                ) : (
                                    <div className="flex flex-col gap-2 mb-4">
                                        <div className="bg-sky-50 border border-sky-100 rounded-xl p-3 text-[10px] md:text-xs text-sky-700 leading-relaxed shadow-sm">
                                            <p className="font-semibold mb-1 flex items-center gap-1.5"><i className="fa-solid fa-circle-info"></i> Mẹo tải Video:</p>
                                            <ul className="list-disc pl-4 space-y-0.5 opacity-90">
                                                <li>Up video lên Google Drive hoặc YouTube.</li>
                                                <li>Mở quyền truy cập "Bất kỳ ai có liên kết".</li>
                                            </ul>
                                        </div>
                                        <input type="text" placeholder="Dán link Video (Youtube, Google Drive...)" value={mediaForm.url} onChange={(e) => setMediaForm({...mediaForm, url: e.target.value})} className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-xs md:text-sm outline-none focus:border-rose-400 focus:bg-white transition-colors" />
                                    </div>
                                )}
                                
                                <input type="text" placeholder="Viết chú thích ngắn gọn..." value={mediaForm.caption} onChange={(e) => setMediaForm({...mediaForm, caption: e.target.value})} className="w-full bg-gray-50 border border-gray-200 rounded-xl p-3 text-xs md:text-sm outline-none focus:border-rose-400 focus:bg-white mb-5 transition-colors" />

                                <button onClick={saveMediaToFirebase} disabled={!mediaForm.url || isUploading} className="w-full py-3 bg-rose-500 text-white rounded-xl text-xs md:text-sm font-bold tracking-widest hover:bg-rose-600 active:scale-[0.98] disabled:opacity-50 transition-all shadow-md shadow-rose-200 flex items-center justify-center gap-2">
                                    {isUploading ? <><i className="fa-solid fa-spinner fa-spin"></i> Đang tải lên...</> : <><i className="fa-solid fa-paper-plane"></i> Đăng Lên Kỷ Yếu</>}
                                </button>
                            </div>
                        </div>
                    )}

                    {isTheaterMode && (

                                            return (
                                                <div key={stage.id} className="glass p-6 md:p-8 rounded-[2.5rem] shadow-sm relative group overflow-hidden border border-white/60">
                                                    <div className={`absolute -right-10 -top-10 w-40 h-40 rounded-full opacity-20 blur-2xl pointer-events-none transition-transform group-hover:scale-150 duration-700 ${stage.bg.replace('bg-', 'bg-')} bg-current`}></div>
                                                    <div className="flex flex-col md:flex-row md:items-end justify-between mb-6 border-b border-gray-200/60 pb-4 relative z-10">
                                                        <div>
                                                            <div className="flex items-center gap-3 mb-2">
                                                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-xl shadow-inner ${stage.bg} ${stage.color}`}><i className={`fa-solid ${stage.icon}`}></i></div>
                                                                <div>
                                                                    <span className={`text-[10px] font-bold uppercase tracking-wider ${stage.color} opacity-80`}>{stage.year}</span>
                                                                    <h3 className="text-2xl md:text-3xl font-serif text-gray-800">{stage.title} <span className="text-gray-400 font-sans text-lg md:text-xl font-light">| {stage.id}</span></h3>
                                                                </div>
                                                            </div>
                                                            <p className="text-sm text-gray-500 max-w-2xl mt-2 italic">{stage.desc}</p>
                                                        </div>
                                                        {(!appSettings.isTimelineLocked || isAdmin) && !isGuest && (
                                                            <button onClick={() => { setMediaForm({...mediaForm, grade: stage.id, context: 'journey', type: 'image', url: ''}); setShowAddMedia(true); }} className="mt-4 md:mt-0 px-5 py-2.5 bg-white border border-dashed border-rose-300 text-rose-500 rounded-xl text-xs font-bold hover:bg-rose-50 transition-colors shadow-sm flex items-center justify-center gap-2 hover:scale-105 shrink-0"><i className="fa-solid fa-plus"></i> Góp ký ức {stage.id}</button>
                                                        )}
                                                    </div>
                                                    <div className="gallery-3d-container">
                                                        {stageImages.length > 0 ? (
                                                            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 md:gap-6 auto-rows-[160px] md:auto-rows-[200px]">
                                                                {stageImages.map((item, idx) => (
                                                                    <div key={item.id} draggable={(!appSettings.isTimelineLocked || isAdmin) && !isGuest ? "true" : "false"} onDragStart={(e) => handleDragStart(e, item)} onDragEnd={handleDragEnd} onDragOver={handleDragOver} onDrop={(e) => handleDrop(e, item)} className={`polaroid-3d tilt-${idx % 4} ${item.colSpan} row-span-1 relative group w-full h-full flex flex-col`}>
                                                                        <div className="absolute inset-0 z-20 cursor-pointer" onClick={() => setSelectedMedia(item)} onContextMenu={e=>e.preventDefault()}></div>
                                                                        
                                                                        {(!isGuest && ((!appSettings.isTimelineLocked && item.uploaderUid === currentUser?.uid) || isAdmin)) && (
                                                                            <button onClick={(e) => handleDeleteMedia(e, item.id)} className={`absolute top-3 right-3 w-8 h-8 backdrop-blur text-white rounded-full flex items-center justify-center transition-all shadow-md z-30 opacity-90 md:opacity-0 group-hover:opacity-100 scale-100 hover:scale-110 ${isAdmin ? 'bg-indigo-500 hover:bg-indigo-600' : 'bg-rose-500 hover:bg-rose-600'}`} title={isAdmin ? "Admin: Xóa ảnh này" : "Gỡ ảnh này"}><i className="fa-solid fa-trash-can text-[11px]"></i></button>
                                                                        )}

                                                                        <div className="flex-1 w-full relative overflow-hidden rounded-lg bg-gray-100 pointer-events-none border border-black/5">
                                                                            {item.type === 'image' ? <img src={item.url} alt="Kỷ niệm" className="anti-theft-img w-full h-full object-cover" draggable="false" /> : (
                                                                                <div className="w-full h-full bg-gray-900 flex items-center justify-center relative"><img src={item.url} className="absolute inset-0 w-full h-full object-cover opacity-60 blur-[2px]" onError={(e) => e.target.style.display = 'none'}/><div className="w-12 h-12 bg-white/30 backdrop-blur-md rounded-full flex items-center justify-center relative z-10 text-white shadow-lg border border-white/50"><i className="fa-solid fa-play ml-1"></i></div></div>
                                                                            )}
                                                                        </div>
                                                                        <div className="absolute -top-3 left-1/2 transform -translate-x-1/2 w-6 h-6 bg-red-400 rounded-full shadow-[inset_-2px_-2px_4px_rgba(0,0,0,0.3),2px_2px_4px_rgba(0,0,0,0.2)] z-10"><div className="absolute top-1 left-1 w-2 h-2 bg-white/50 rounded-full"></div></div>
                                                                        <div className="absolute bottom-2 left-0 w-full text-center px-2 pointer-events-none"><span className="font-cursive text-gray-500 text-sm opacity-80 truncate block">{item.caption || (item.type === 'video' ? 'Video' : 'Memory')}</span></div>
                                                                    </div>
                                                                ))}
                                                            </div>
                                                        ) : (
                                                            <div className="w-full py-16 flex flex-col items-center justify-center border-2 border-dashed border-rose-200 rounded-2xl text-rose-400 bg-white/40">
                                                                <i className="fa-solid fa-images text-4xl mb-3 opacity-60"></i><p className="text-sm font-sans uppercase tracking-widest font-semibold">Chưa có ký ức nào</p><p className="text-xs mt-1 font-serif text-gray-500 italic">Hãy là người đầu tiên đóng góp cho năm {stage.id}!</p>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>

                            <div style={getSlideStyle(5)} className="w-full h-full flex items-center justify-center px-4 md:px-6 relative overflow-hidden">
                                <div className="absolute inset-0 pointer-events-none overflow-hidden opacity-40">
                                    {members.filter(m => m.quote && m.quote !== 'Thanh xuân như một cơn mưa rào...').slice(0, 15).map((member, i) => {
                                        const top = `${Math.floor(Math.random() * 80) + 10}%`, left = `${Math.floor(Math.random() * 80) + 10}%`, animationDuration = `${Math.floor(Math.random() * 10) + 15}s`, animationDelay = `-${Math.floor(Math.random() * 10)}s`, rotate = `rotate(${Math.floor(Math.random() * 40) - 20}deg)`;
                                        return <div key={i} className="absolute font-cursive text-gray-500 text-lg md:text-2xl whitespace-nowrap animate-pulse" style={{ top, left, transform: rotate, animation: `float ${animationDuration} ease-in-out infinite alternate`, animationDelay }}>{member.name.split(' ').pop()}: "{member.quote.length > 30 ? member.quote.substring(0, 30) + '...' : member.quote}"</div>
                                    })}
                                </div>
                                <style dangerouslySetInnerHTML={{__html: `@keyframes float { 0% { transform: translateY(0px) rotate(-5deg); opacity: 0.3; } 50% { opacity: 0.8; } 100% { transform: translateY(-30px) rotate(5deg); opacity: 0.3; } }`}} />

                                <div className="max-w-3xl w-full z-10">
                                    <div className="glass p-8 md:p-12 rounded-[2.5rem] shadow-2xl border border-white/60 relative group hover:border-rose-200 transition-colors duration-700">
                                        <div className="absolute -top-6 -right-6 w-20 h-20 bg-rose-500 rounded-full flex items-center justify-center text-white shadow-lg transform rotate-12 group-hover:rotate-0 transition-transform duration-500 border-4 border-white">
                                            <div className="text-center"><span className="block text-[10px] uppercase font-bold tracking-widest border-b border-white/50 pb-0.5 mb-0.5">Class of</span><span className="block font-serif text-xl">2026</span></div>
                                        </div>
                                        <div className="text-center">
                                            <i className="fa-solid fa-paper-plane text-4xl text-rose-300 mb-6 group-hover:-translate-y-2 group-hover:translate-x-2 transition-transform duration-500"></i>
                                            <h2 className="text-4xl md:text-5xl font-serif text-gray-800 mb-6 leading-tight">Trạm Cuối: <br/><span className="text-rose-500 font-cursive text-5xl md:text-6xl block mt-2">Trưởng Thành</span></h2>
                                            <div className="w-16 h-px bg-rose-200 mx-auto mb-6"></div>
                                            <p className="font-serif italic text-lg md:text-xl text-gray-600 leading-relaxed mb-8">"Chuyến tàu mang tên thanh xuân không có vé khứ hồi. Cảm ơn 49 mảnh ghép đã cùng nhau tạo nên một 12A3 rực rỡ nhất. Tạm biệt nhé, những năm tháng đẹp nhất cuộc đời..."</p>
                                            <div className="flex flex-col md:flex-row items-center justify-center gap-4 mt-8">
                                                <button onClick={() => setCurrentSlide(0)} className="px-6 py-3 bg-gray-900 text-white rounded-full text-xs font-bold uppercase tracking-widest hover:bg-rose-500 transition-colors shadow-lg flex items-center gap-2"><i className="fa-solid fa-rotate-left"></i> Xem lại từ đầu</button>
                                                <a href="https://www.facebook.com/share/1CP9V3S9Hq/" target="_blank" className="px-6 py-3 bg-white text-gray-800 border border-gray-200 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-gray-50 transition-colors shadow-sm flex items-center gap-2"><i className="fa-brands fa-facebook text-blue-500"></i> Group Lớp</a>
                                            </div>
                                        </div>
                                    </div>
                                    <p className="text-center mt-6 text-[10px] uppercase tracking-widest text-gray-400 font-medium">Được lưu trữ vĩnh viễn trong mỗi người <i className="fa-solid fa-cloud text-rose-300 ml-1"></i></p>
                                </div>
                            </div>
                        </div>

                        {selectedMember && (
                            <div className="fixed inset-0 z-[100] flex items-center justify-center p-3 md:p-6">
                                <div className="absolute inset-0 bg-black/40 backdrop-blur-md animate-fadeIn" onClick={() => { 
                                    setSelectedMember(null); 
                                    setIsEditing(false); 
                                    if(tutorialStep > 0) setTutorialStep(0); 
                                }}></div>
                                
                                <div className="relative w-full max-w-5xl bg-white rounded-[2rem] shadow-2xl overflow-hidden flex flex-col md:flex-row h-[90dvh] md:h-[650px] z-[101] border border-white/20 animate-slideUp">
                                    
                                    <button onClick={() => { setSelectedMember(null); setIsEditing(false); if(tutorialStep>0) setTutorialStep(0); }} className="absolute top-4 right-4 text-gray-400 hover:text-gray-800 bg-gray-100/80 backdrop-blur rounded-full w-8 h-8 flex items-center justify-center z-[110] transition-transform hover:scale-110"><i className="fa-solid fa-xmark"></i></button>

                                    <div className={`w-full md:w-5/12 p-4 md:p-10 flex flex-col items-center relative overflow-y-auto hide-scrollbar shrink-0 h-[45%] md:h-full ${(!isEditing || isMobile) ? (PROFILE_THEMES.find(t=>t.id===selectedMember.theme)?.light || 'bg-rose-50') : 'bg-gray-50'} transition-colors duration-500 border-b md:border-b-0 md:border-r border-white/50`}>
                                        {(!isEditing || isMobile) ? (
                                            <>
                                                <div className={`w-24 h-24 md:w-36 md:h-36 mt-4 rounded-full p-1.5 mb-3 md:mb-6 shadow-xl ${PROFILE_THEMES.find(t=>t.id===selectedMember.theme)?.bg || 'bg-rose-400'} bg-opacity-20 shrink-0 transition-transform hover:scale-105 duration-300 relative group`}>
                                                    <div className="absolute inset-0 z-20" onContextMenu={e=>e.preventDefault()}></div>
                                                    <div className="w-full h-full rounded-full overflow-hidden border-2 border-white bg-white">
                                                        <img src={selectedMember.avatar} alt="Avatar" className="w-full h-full object-cover anti-theft-img" draggable="false" />
                                                    </div>
                                                </div>
                                                <h3 className="font-serif text-xl md:text-3xl text-center mb-1 md:mb-2 font-medium text-gray-800">{selectedMember.name}</h3>
                                                <div className="px-3 py-1 rounded-full bg-white/60 text-[9px] md:text-xs uppercase tracking-widest font-semibold text-gray-600 mb-4 md:mb-6 shadow-sm border border-white shrink-0">{selectedMember.role}</div>
                                                
                                                <div className="relative text-center px-4 w-full max-w-[280px]">
                                                    <i className={`fa-solid fa-quote-left absolute -top-3 -left-1 text-2xl opacity-20 text-gray-800`}></i>
                                                    <p className="font-cursive text-lg md:text-2xl text-gray-700 leading-snug">"{selectedMember.quote}"</p>
                                                </div>

                                                <div className="flex gap-4 mt-4 md:mt-6 justify-center w-full shrink-0">
                                                    {selectedMember.facebook && <a href={formatSocialLink(selectedMember.facebook, 'facebook')} target="_blank" className="text-blue-500 text-xl md:text-2xl hover:scale-125 transition-transform"><i className="fa-brands fa-facebook"></i></a>}
                                                    {selectedMember.instagram && <a href={formatSocialLink(selectedMember.instagram, 'instagram')} target="_blank" className="text-pink-500 text-xl md:text-2xl hover:scale-125 transition-transform"><i className="fa-brands fa-instagram"></i></a>}
                                                    {selectedMember.tiktok && <a href={formatSocialLink(selectedMember.tiktok, 'tiktok')} target="_blank" className="text-gray-800 text-xl md:text-2xl hover:scale-125 transition-transform"><i className="fa-brands fa-tiktok"></i></a>}
                                                </div>
                                                
                                                <div className="mt-auto pt-4 md:pt-6 flex flex-col gap-2 w-full pb-2 shrink-0">
                                                    {!isGuest ? (
                                                        (!selectedMember.isLocked || sessionUnlockedMembers.has(selectedMember.id) || isAdmin) ? (
                                                            <button 
                                                                onClick={() => { 
                                                                    setIsEditing(true); 
                                                                    if (tutorialStep === 2) setTimeout(() => setTutorialStep(3), 300); 
                                                                }} 
                                                                className={`w-full py-2 md:py-2.5 rounded-xl text-[10px] md:text-xs font-semibold uppercase tracking-widest transition-all shadow-sm flex items-center justify-center gap-2 hover:shadow-md ${isAdmin ? 'bg-indigo-50 hover:bg-indigo-100 text-indigo-600 border border-indigo-200' : 'bg-white/50 text-gray-600 hover:bg-white'} ${tutorialStep === 2 ? 'tutorial-highlight scale-105' : ''}`}
                                                            >
                                                                <i className="fa-solid fa-pen"></i> Sửa hồ sơ {isAdmin ? '(Admin)' : ''}
                                                            </button>
                                                        ) : (
                                                            <button 
                                                                onClick={() => {
                                                                    if (selectedMember.pinResetState === 'approved') {
                                                                        setPinConfig({ show: true, mode: 'reset_approved', error: '' });
                                                                        setPinInput1(''); setPinInput2('');
                                                                    } else {
                                                                        setPinConfig({ show: true, mode: 'unlock', error: '' });
                                                                        setPinInput1('');
                                                                    }
                                                                }} 
                                                                className="w-full py-2 md:py-2.5 rounded-xl bg-rose-50 border border-rose-200 text-rose-500 hover:bg-rose-100 hover:scale-105 text-[10px] md:text-xs font-bold uppercase tracking-widest flex items-center justify-center gap-2 transition-all shadow-sm"
                                                            >
                                                                <i className="fa-solid fa-lock"></i> Sửa hồ sơ (Cần mã PIN)
                                                            </button>
                                                        )
                                                    ) : (
                                                        <div className="w-full py-2 md:py-2.5 rounded-xl border-2 border-dashed border-gray-200 text-gray-400 text-[10px] md:text-xs font-medium uppercase tracking-widest flex items-center justify-center gap-2">
                                                            <i className="fa-solid fa-eye"></i> Chế độ xem
                                                        </div>
                                                    )}
                                                </div>
                                            </>
                                        ) : (
                                            renderEditForm()
                                        )}
                                    </div>

                                    <div className="w-full md:w-7/12 flex flex-col h-[55%] md:h-full shrink-0 bg-white relative">
                                        <div className="px-4 md:px-5 py-3 md:py-4 border-b border-gray-100 flex items-center gap-3 bg-white/80 backdrop-blur z-10 shrink-0">
                                            <div className="w-7 h-7 md:w-8 md:h-8 rounded-full bg-rose-50 flex items-center justify-center text-rose-400"><i className="fa-regular fa-message text-[10px] md:text-sm"></i></div>
                                            <div>
                                                <h4 className="font-sans font-semibold text-xs md:text-sm text-gray-800 leading-tight">Tường Nhà</h4>
                                                <p className="text-[8px] md:text-[9px] text-gray-400 uppercase tracking-widest">Gửi gắm cho {(selectedMember.name || 'Bạn').split(' ').pop()}</p>
                                            </div>
                                        </div>

                                        <div className="flex-1 overflow-y-auto hide-scrollbar p-3 md:p-6 space-y-3 md:space-y-4 bg-gray-50/50 relative">
                                            {!selectedMember.messages || selectedMember.messages.length === 0 ? (
                                                <div className="absolute inset-0 flex flex-col items-center justify-center text-gray-300 text-center pointer-events-none">
                                                    <i className="fa-solid fa-envelope-open-text text-3xl md:text-4xl mb-2 md:mb-3 opacity-50"></i>
                                                    <p className="font-cursive text-lg md:text-xl text-gray-400">Chưa có lời nhắn nào...</p>
                                                </div>
                                            ) : (
                                                selectedMember.messages.map(msg => (
                                                    <div key={msg.id} className="bg-white p-3 md:p-4 rounded-2xl shadow-sm border border-gray-100 relative group transition-colors hover:shadow-md animate-slideUp">
                                                        <p className="font-cursive text-lg md:text-xl text-gray-700 mb-2 md:mb-3 leading-relaxed">"{msg.content}"</p>
                                                        <div className="flex justify-between items-center mt-2 pt-2 border-t border-gray-50">
                                                            <span className="text-[10px] md:text-[11px] font-semibold text-gray-600 flex items-center gap-1.5"><i className="fa-solid fa-user-pen text-gray-300"></i> {msg.author}</span>
                                                            <span className="text-[8px] md:text-[9px] text-gray-400 flex items-center gap-2">
                                                                {msg.date}
                                                                {isAdmin && (
                                                                    <button onClick={() => handleDeleteMessage(msg.id)} className="w-5 h-5 flex items-center justify-center rounded-full bg-gray-100 hover:bg-rose-500 hover:text-white transition-colors" title="Admin: Xóa lời nhắn này">
                                                                        <i className="fa-solid fa-trash-can"></i>
                                                                    </button>
                                                                )}
                                                            </span>
                                                        </div>
                                                    </div>
                                                ))
                                            )}
                                        </div>

                                        <div className="p-3 md:p-5 border-t border-gray-100 bg-white shrink-0">
                                            {!isGuest ? (
                                                <form onSubmit={handleLeaveMessage} className="flex flex-col gap-2">
                                                    <div className="flex gap-2 items-center">
                                                        <div className="w-8 h-8 md:w-10 md:h-10 rounded-xl bg-gray-100 flex items-center justify-center text-gray-400 shrink-0"><i className="fa-solid fa-signature text-xs md:text-base"></i></div>
                                                        <input name="author" type="text" placeholder={isAdmin ? "Tên của bạn (Đang dùng quyền Admin)" : "Tên của bạn..."} required className="flex-1 bg-gray-50 border border-gray-100 rounded-xl px-3 py-2 text-xs md:text-sm outline-none focus:border-rose-300 transition-colors shadow-inner" />
                                                    </div>
                                                    <div className="flex gap-2 items-end">
                                                        <textarea name="content" rows="2" placeholder="Viết gì đó..." required className="flex-1 bg-gray-50 border border-gray-100 rounded-xl p-2 md:p-3 text-xs md:text-sm outline-none focus:border-rose-300 transition-colors resize-none font-serif shadow-inner" />
                                                        <button type="submit" disabled={isUploading} className={`w-10 h-10 md:w-12 md:h-12 rounded-xl text-white flex items-center justify-center transition-transform active:scale-95 disabled:opacity-50 shrink-0 shadow-md ${isAdmin ? 'bg-indigo-500 hover:bg-indigo-600 shadow-indigo-200' : 'bg-rose-500 hover:bg-rose-600 shadow-rose-200'}`}>
                                                            {isUploading ? <i className="fa-solid fa-spinner fa-spin"></i> : <i className="fa-solid fa-paper-plane text-xs md:text-sm"></i>}
                                                        </button>
                                                    </div>
                                                </form>
                                            ) : (
                                                <div className="bg-gray-50 rounded-xl p-4 text-center border border-gray-100">
                                                    <p className="text-[10px] md:text-xs text-gray-400 uppercase tracking-widest font-semibold"><i className="fa-solid fa-lock text-rose-300 mr-1"></i> Chế độ Khách tham quan</p>
                                                    <p className="text-xs md:text-sm text-gray-500 font-serif italic mt-1">Chỉ thành viên lớp mới có thể để lại lời nhắn.</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {(isEditing && isMobile && selectedMember) && (
                            <div className="fixed inset-0 z-[200] flex items-end justify-center md:hidden">
                                <div className="absolute inset-0 bg-black/60 backdrop-blur-sm animate-fadeIn" onClick={() => setIsEditing(false)}></div>
                                <div className="relative w-full bg-white rounded-t-[2rem] shadow-2xl z-[201] animate-slideUp flex flex-col pt-3 pb-6 px-5" style={{ maxHeight: '90dvh' }}>
                                    <div className="w-12 h-1.5 bg-gray-300 rounded-full mx-auto mb-3 shrink-0"></div>
                                    <button onClick={() => setIsEditing(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-800 bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center z-[210]"><i className="fa-solid fa-xmark"></i></button>
                                    {renderEditForm()}
                                </div>
                            </div>
                        )}

                        {showMemberList && (
                            <div className="fixed inset-0 z-[400] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm animate-fadeIn">
                                <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl overflow-hidden flex flex-col max-h-[80vh] md:max-h-[70vh] animate-slideUp relative border border-white/50">
                                    <div className="p-4 md:p-5 border-b border-gray-100 bg-gray-50 flex justify-between items-center shrink-0">
                                        <div>
                                            <h3 className="font-serif text-lg font-bold text-gray-800">Sĩ số lớp 12A3</h3>
                                            <p className="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Tìm số hiệu của bạn</p>
                                        </div>
                                        <button onClick={() => setShowMemberList(false)} className="w-8 h-8 rounded-full bg-white border border-gray-200 text-gray-500 hover:text-rose-500 hover:border-rose-200 shadow-sm flex items-center justify-center transition-transform hover:scale-110"><i className="fa-solid fa-xmark"></i></button>
                                    </div>
                                    <div className="overflow-y-auto p-4 space-y-1 hide-scrollbar">
                                        {DEFAULT_CLASS_LIST.map((mem, i) => (
                                            <div key={i} className={`flex items-center justify-between p-2.5 hover:bg-rose-50 rounded-xl transition-colors border border-transparent hover:border-rose-100 cursor-pointer ${tutorialStep === 1 && i === 0 ? 'tutorial-highlight' : ''}`} onClick={() => {
                                                setShowMemberList(false);
                                                setCurrentSlide(2);
                                                const found = members.find(m => m.id === `member_${i+1}`);
                                                if(found) {
                                                    setSelectedMember(found);
                                                    setEditForm(found);
                                                    setIsEditing(false);
                                                    if(tutorialStep === 1) setTimeout(() => setTutorialStep(2), 300);
                                                    
                                                    // Mở modal nếu đang ở trạng thái admin duyệt reset
                                                    if (found.pinResetState === 'approved' && !isAdmin) {
                                                        setPinConfig({ show: true, mode: 'reset_approved', error: '' });
                                                        setPinInput1('');
                                                        setPinInput2('');
                                                    }
                                                }
                                            }}>
                                                <span className="text-xs md:text-sm font-medium text-gray-700">
                                                    <span className="text-rose-400 font-bold w-6 inline-block">{i + 1}.</span> {mem.name}
                                                </span>
                                                {mem.role !== 'Thành viên' && (
                                                    <span className="text-[9px] bg-rose-100 text-rose-600 px-2 py-1 rounded-full uppercase font-bold tracking-wider">{mem.role}</span>
                                                )}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
