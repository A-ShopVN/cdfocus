        }
        .animate-slideUp { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out forwards; }
        
        @keyframes kenburns {
            0% { transform: scale(1) translate(0, 0); }

        .animate-kenburns { animation: kenburns 8s ease-out forwards; }

            0% { transform: translateY(25px); opacity: 0; }

            { id: '10A3', year: 'Năm học 2023 - 2024', title: 'Khởi Đầu Bỡ Ngỡ', desc: 'Những ánh mắt rụt rè, những câu chào ngập ngừng ngày đầu tiên bước vào cấp 3. Mọi thứ đều mới mẻ...', icon: 'fa-seedling', color: 'text-emerald-500', bg: 'bg-emerald-100', journeyTitle: "CÙNG ĐẾN VỚI LỚP 10A3" },
            { id: '11A3', year: 'Năm học 2024 - 2025', title: 'Gắn Kết & Nổi Loạn', desc: 'Đã quá quen thuộc với nhau. Những trò quậy phá, những lần trốn học bài, tình bạn tuổi 17 rực rỡ nhất.', icon: 'fa-fire-flame-curved', color: 'text-orange-500', bg: 'bg-orange-100', journeyTitle: "TIẾP THEO LÀ 11A3" },
            { id: '12A3', year: 'Năm học 2025 - 2026', title: 'Trưởng Thành & Chia Xa', desc: 'Áp lực thi cử chồng chất, những trang lưu bút viết vội. Bắt đầu đếm ngược những ngày còn được ở bên nhau.', icon: 'fa-graduation-cap', color: 'text-rose-500', bg: 'bg-rose-100', journeyTitle: "CUỐI CÙNG LÀ 12A3" }
        ];

        const App = () => {
            const savedSlide = parseInt(localStorage.getItem('kyyeu_currentSlide')) || 0;
            const [currentSlide, setCurrentSlide] = useState(savedSlide);
            const totalSlides = 6; 

            useEffect(() => {
                localStorage.setItem('kyyeu_currentSlide', currentSlide);
            }, [currentSlide]);

            useEffect(() => {
                const triggerAntiScreenshot = () => {
                    document.body.classList.add('anti-screenshot-active');
                    setTimeout(() => {
                        document.body.classList.remove('anti-screenshot-active');
                    }, 3000);
                };

                const handleContextMenu = (e) => {
                    e.preventDefault();
                    setCustomDialog({ title: "Bảo Mật", message: "Chức năng lưu ảnh/chuột phải đã bị vô hiệu hóa.", type: "alert" });
                };
                
                const handleKeyDown = (e) => {
                    if (
                        e.key === 'F12' || 
                        (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'C' || e.key === 'c')) || 
                        (e.ctrlKey && (e.key === 'S' || e.key === 's' || e.key === 'U' || e.key === 'u'))
                    ) {
                        e.preventDefault();
                    }

                    if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === 's' || e.key === 'S' || e.key === '3' || e.key === '4')) {
                        triggerAntiScreenshot();
                        setCustomDialog({ title: "Cảnh Báo", message: "Phát hiện công cụ cắt ảnh. Dữ liệu đã bị ẩn!", type: "alert" });
                    }

                    if (e.key === 'PrintScreen' || e.keyCode === 44) {
                        navigator.clipboard.writeText('Cảnh báo: Hành động chụp màn hình kỷ yếu bị cấm!');
                        triggerAntiScreenshot();
                    }
                };

                const handleVisibilityChange = () => {
                    if (document.hidden || document.visibilityState === 'hidden') {
                        document.body.classList.add('anti-screenshot-active');
                    } else {
                        setTimeout(() => document.body.classList.remove('anti-screenshot-active'), 300);
                    }
                };

                const handleBlur = () => document.body.classList.add('anti-screenshot-active');
                const handleFocus = () => setTimeout(() => document.body.classList.remove('anti-screenshot-active'), 300);

                document.addEventListener('contextmenu', handleContextMenu);
                document.addEventListener('keydown', handleKeyDown);
                document.addEventListener('visibilitychange', handleVisibilityChange);
                window.addEventListener('blur', handleBlur);
                window.addEventListener('focus', handleFocus);

                return () => {
                    document.removeEventListener('contextmenu', handleContextMenu);
                    document.removeEventListener('keydown', handleKeyDown);
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    window.removeEventListener('blur', handleBlur);
                    window.removeEventListener('focus', handleFocus);
                };
            }, []);

            const [userRole, setUserRole] = useState(localStorage.getItem('kyyeu_userRole') || null);
            // ADMIN ROLE CHECK
            const isAdmin = userRole === 'admin';
            const isGuest = userRole === 'guest';
            
            const [authView, setAuthView] = useState('select');
            const [quizRole, setQuizRole] = useState(null); 
            const [quizQuestions, setQuizQuestions] = useState([]);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [quizScore, setQuizScore] = useState(0);
            const [quizPassed, setQuizPassed] = useState(false);
            
            // ADMIN LOGIN STATE & REQUESTS PANEL
            const [adminPass, setAdminPass] = useState('');
            const [authError, setAuthError] = useState('');
            const [showAdminRequests, setShowAdminRequests] = useState(false);
            const [showDashboard, setShowDashboard] = useState(isAdmin); // Đã sửa: Tự động nhận diện quyền để bật/tắt Dashboard

            const [tutorialStep, setTutorialStep] = useState(0);
            const [touchStart, setTouchStart] = useState(null);
            const [touchEnd, setTouchEnd] = useState(null);
            
            const [currentUser, setCurrentUser] = useState(null); 
            const [members, setMembers] = useState([]);
            const [gallery, setGallery] = useState([]);
            const [appSettings, setAppSettings] = useState({ isTimelineLocked: false });
            
            const [selectedMember, setSelectedMember] = useState(null);
            const [isEditing, setIsEditing] = useState(false);
            const [editForm, setEditForm] = useState({});
            
            const [pinConfig, setPinConfig] = useState({ show: false, mode: '', error: '' }); 
            const [pinInput1, setPinInput1] = useState(''); 
            const [pinInput2, setPinInput2] = useState(''); 
            const [pinInput3, setPinInput3] = useState(''); 
            const [sessionUnlockedMembers, setSessionUnlockedMembers] = useState(new Set());

            const [showFirebaseError, setShowFirebaseError] = useState(false);
            const [customDialog, setCustomDialog] = useState(null); 
            const [showAddMedia, setShowAddMedia] = useState(false);
            const [mediaForm, setMediaForm] = useState({ type: 'image', url: '', caption: '', grade: '12A3', context: 'general' });
            
            const [gradeFilter, setGradeFilter] = useState('all'); 
            const [isUploading, setIsUploading] = useState(false);
            const [selectedMedia, setSelectedMedia] = useState(null); 
            const [mediaFilter, setMediaFilter] = useState('all'); 
            
            const [isTheaterMode, setIsTheaterMode] = useState(false);
            const [theaterModeType, setTheaterModeType] = useState('normal'); 
            const [theaterCurrentIndex, setTheaterCurrentIndex] = useState(0);
            
            const [showMemberList, setShowMemberList] = useState(false);
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            
            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const appId = 'cd12a3';

            const stats = {
                totalMembers: members.length,
                lockedMembers: members.filter(m => m.isLocked).length,
                totalMedia: gallery.length,
                totalMessages: members.reduce((acc, m) => acc + (m.messages?.length || 0), 0)
            };

            const allMessages = members.flatMap(m => (m.messages || []).map(msg => ({ ...msg, ownerId: m.id, ownerName: m.name }))).sort((a, b) => b.id - a.id);

            const handleAdminDeleteMessageGlobal = (ownerId, msgId) => {
                setCustomDialog({
                    title: "Xóa Lời Nhắn",
                    message: "Bạn có chắc chắn muốn xóa vĩnh viễn lời nhắn này khỏi hệ thống?",
                    type: "confirm",
                    onConfirm: async () => {
                        const member = members.find(m => m.id === ownerId);
                        if (member) {
                            const newMessages = member.messages.filter(m => m.id !== msgId);
                            const { doc, setDoc } = window.firebaseHooks;
                            try {
                                await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'members', ownerId), { messages: newMessages }, { merge: true });
                            } catch(e) {
                                setCustomDialog({ title: "Lỗi", message: "Không thể xóa lời nhắn.", type: "alert" });
                            }
                        }
                    }
                });
            };

            const handleForceResetPinDashboard = (memberId, memberName) => {
                setCustomDialog({
                    title: "Bẻ Khóa (Force Reset)",
                    message: `Bạn đang dùng quyền Admin để bẻ khóa hồ sơ của [${memberName}]. Xác nhận?`,
                    type: "confirm",
                    onConfirm: async () => {
                        const { doc, setDoc } = window.firebaseHooks;
                        try {
                            await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'members', memberId), { pin: null, isLocked: false, pinResetState: 'none' }, { merge: true });
                            setCustomDialog({ title: "Thành công", message: `Đã bẻ khóa cho ${memberName}.`, type: "alert" });
                        } catch(e) {
                            setCustomDialog({ title: "Lỗi", message: "Không thể bẻ khóa.", type: "alert" });
                        }
                    }
                });
            };

            const getEmbedUrl = (url) => {
                if (!url || typeof url !== 'string') return '';
                if (url.includes('drive.google.com/file/d/')) return url.replace('/view', '/preview');
                let videoId = '';
                if (url.includes('youtube.com/watch?v=')) videoId = url.split('v=')[1]?.split('&')[0];
                else if (url.includes('youtu.be/')) videoId = url.split('youtu.be/')[1]?.split('?')[0];
                return videoId ? `https://www.youtube.com/embed/${videoId}` : url;
            };

            const formatSocialLink = (link, platform) => {
                if (!link) return '#';
                let formatted = link.trim();
                if (formatted.startsWith('http://') || formatted.startsWith('https://')) return formatted;
                if (platform === 'tiktok') {
                    if (formatted.startsWith('@')) return `https://www.tiktok.com/${formatted}`;
                    if (formatted.includes('tiktok.com')) return `https://${formatted}`;
                    return `https://www.tiktok.com/@${formatted}`;
                }
                if (platform === 'instagram') {
                    if (formatted.startsWith('@')) return `https://www.instagram.com/${formatted.substring(1)}`;
                    if (formatted.includes('instagram.com')) return `https://${formatted}`;
                    return `https://www.instagram.com/${formatted}`;
                }
                if (platform === 'facebook') {
                    if (formatted.includes('facebook.com') || formatted.includes('fb.com')) return `https://${formatted}`;
                    return `https://www.facebook.com/${formatted}`;
                }
                return `https://${formatted}`;
            };

            useEffect(() => {
                if (!userRole) return; 
                const initTimer = setTimeout(async () => {
                    const { collection, onSnapshot, signInAnonymously, doc } = window.firebaseHooks;
                    const db = window.firebaseDB;
                    const auth = window.firebaseAuth;

                    try {
                        try {
                            const userCred = await signInAnonymously(auth);
                            setCurrentUser(userCred.user);
                        } catch (authErr) {
                            setShowFirebaseError(true);
                        }

                        const settingsRef = doc(db, 'artifacts', appId, 'public', 'data', 'app_settings', 'config');
                        const unsubSettings = onSnapshot(settingsRef, (docSnap) => {
                            if (docSnap.exists()) setAppSettings(docSnap.data());
                        });

                        const membersRef = collection(db, 'artifacts', appId, 'public', 'data', 'members');
                        const unsubMembers = onSnapshot(membersRef, (snapshot) => {
                            let dbMembers = [];
                            snapshot.forEach((doc) => dbMembers.push({ id: doc.id, ...doc.data() }));

                            const mergedMembers = Array.from({ length: 49 }, (_, i) => {
                                const id = `member_${i+1}`;
                                const found = dbMembers.find(m => m.id === id);
                                const defaultInfo = DEFAULT_CLASS_LIST[i] || { name: `Thành viên ${i+1}`, role: 'Thành viên' };
                                const defaultAvatar = `https://api.dicebear.com/7.x/notionists/svg?seed=12A3_${i + 1}&backgroundColor=ffe4e6`;
                                
                                let actualIsLocked = false;
                                if (found) {
                                    actualIsLocked = found.isLocked && !!found.pin;
                                }

                                return found ? { 
                                    ...found, 
                                    name: defaultInfo.name, 
                                    role: defaultInfo.role, 
                                    avatar: found.avatar || defaultAvatar, 
                                    quote: found.quote || 'Thanh xuân như một cơn mưa rào...',
                                    theme: found.theme || 'rose',
                                    messages: found.messages || [],
                                    isLocked: actualIsLocked,
                                    pinResetState: found.pinResetState || 'none'
                                } : {
                                    id, name: defaultInfo.name, role: defaultInfo.role,
                                    avatar: defaultAvatar,
                                    quote: 'Thanh xuân như một cơn mưa rào...', facebook: '', instagram: '', tiktok: '', isLocked: false, pin: null, theme: 'rose', messages: [], pinResetState: 'none'
                                };
                            });
                            setMembers(mergedMembers);
                            
                            if (selectedMember) {
                                const updatedSelected = mergedMembers.find(m => m.id === selectedMember.id);
                                if (updatedSelected) setSelectedMember(updatedSelected);
                            }
                        }, (error) => setShowFirebaseError(true));

                        const galleryRef = collection(db, 'artifacts', appId, 'public', 'data', 'gallery');
                        const unsubGallery = onSnapshot(galleryRef, (snapshot) => {
                            let dbGallery = [];
                            snapshot.forEach((doc) => dbGallery.push({ id: doc.id, ...doc.data() }));
                            setGallery(dbGallery.sort((a, b) => b.createdAt - a.createdAt));
                        });
                        
                        return () => { unsubMembers(); unsubGallery(); unsubSettings(); };
                    } catch (err) { console.error("Error:", err); }
                }, 500); 
                return () => clearTimeout(initTimer);
            }, [selectedMember?.id, userRole]);

            // THÊM: Theo dõi nếu Admin duyệt, popup tự động hiện ra cho User
            useEffect(() => {
                if (selectedMember && selectedMember.pinResetState === 'approved' && !isAdmin) {
                    setPinConfig({ show: true, mode: 'reset_approved', error: '' });
                    setPinInput1('');
                    setPinInput2('');
                }
            }, [selectedMember?.pinResetState, isAdmin]);

            const presentationItems = useMemo(() => {
                if (theaterModeType === 'journey') {
                    let sequence = [];
                    TIMELINE_STAGES.forEach(stage => {
                        const items = gallery.filter(item => item.grade === stage.id && item.context === 'journey').sort((a,b) => a.createdAt - b.createdAt);
                        sequence.push({ id: `title_card_${stage.id}`, type: 'titleCard', title: stage.journeyTitle });
                        if (items.length > 0) sequence.push(...items);
                        else sequence.push({ id: `placeholder_${stage.id}`, type: 'endingCard', title: `Chưa có khoảnh khắc nào của chặng đường ${stage.id} được gửi lên.` });
                    });
                    sequence.push({ id: 'ending_card', type: 'endingCard', title: "Chúc các bạn dồi dào sức khỏe, luôn hạnh phúc và gặt hái nhiều thành công." });
                    return sequence;
                } else {
                    return gallery.filter(item => {
                        const matchContext = item.context === 'general' || !item.context;
                        const matchType = mediaFilter === 'all' || item.type === mediaFilter;
                        const matchGrade = gradeFilter === 'all' || item.grade === gradeFilter;
                        return matchContext && matchType && matchGrade;
                    }).sort((a,b) => a.createdAt - b.createdAt);
                }
            }, [gallery, theaterModeType, mediaFilter, gradeFilter]);
            
            useEffect(() => {
                let timer;
                if (isTheaterMode && presentationItems.length > 0) {
                    const currentItem = presentationItems[theaterCurrentIndex];
                    if (currentItem.type === 'endingCard') {
                        if (currentItem.id === 'ending_card') timer = setTimeout(() => { setIsTheaterMode(false); setTheaterCurrentIndex(0); }, 5000);
                        else timer = setTimeout(() => setTheaterCurrentIndex(prev => (prev + 1) % presentationItems.length), 4000);
                    } else if (currentItem.type === 'titleCard') {
                        timer = setTimeout(() => setTheaterCurrentIndex(prev => (prev + 1) % presentationItems.length), 3500); 
                    } else if (currentItem.type === 'image') {
                        timer = setTimeout(() => setTheaterCurrentIndex(prev => (prev + 1) % presentationItems.length), 4500); 
                    }
                } else setTheaterCurrentIndex(0);
                return () => clearTimeout(timer);
            }, [isTheaterMode, presentationItems.length, theaterCurrentIndex]);

            const nextTheaterSlide = () => setTheaterCurrentIndex(prev => (prev + 1) % presentationItems.length);
            const prevTheaterSlide = () => setTheaterCurrentIndex(prev => prev === 0 ? presentationItems.length - 1 : prev - 1);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (isTheaterMode) {
                        if (e.key === 'Escape') setIsTheaterMode(false);
                        if (e.key === 'ArrowRight') nextTheaterSlide();
                        if (e.key === 'ArrowLeft') prevTheaterSlide();
                        return;
                    }
                    if (!userRole || selectedMember || showAddMedia || customDialog || showFirebaseError || selectedMedia || showMemberList || tutorialStep > 0 || pinConfig.show || showAdminRequests) return; 
                    if (e.key === 'ArrowRight') nextSlide();
                    if (e.key === 'ArrowLeft') prevSlide();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [currentSlide, selectedMember, showAddMedia, customDialog, showFirebaseError, selectedMedia, isTheaterMode, showMemberList, presentationItems.length, tutorialStep, userRole, pinConfig.show, showAdminRequests]);

            const nextSlide = () => setCurrentSlide(prev => Math.min(prev + 1, totalSlides - 1));
            const prevSlide = () => setCurrentSlide(prev => Math.max(prev - 1, 0));

            const handleTouchStart = (e) => {
                setTouchEnd(null);
                setTouchStart({ x: e.targetTouches[0].clientX, y: e.targetTouches[0].clientY });
            };
            const handleTouchMove = (e) => setTouchEnd({ x: e.targetTouches[0].clientX, y: e.targetTouches[0].clientY });
            const handleTouchEnd = () => {
                if (!touchStart || !touchEnd || tutorialStep > 0 || !userRole || pinConfig.show || showAdminRequests) return; 
                const distanceX = touchStart.x - touchEnd.x;
                const distanceY = Math.abs(touchStart.y - touchEnd.y);
                if (distanceY < 80) {
                    if (distanceX > 50) nextSlide();
                    if (distanceX < -50) prevSlide();
                }
            };

            const compressImage = (file, callback) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600;
                        let width = img.width, height = img.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        callback(canvas.toDataURL('image/jpeg', 0.7)); 
                    };
                };
            };
            
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) compressImage(file, (compressedBase64) => setEditForm(prev => ({ ...prev, avatar: compressedBase64 })));
            };

            const handleDragStart = (e, item) => { e.dataTransfer.setData('sourceId', item.id); e.dataTransfer.effectAllowed = 'move'; setTimeout(() => e.target.classList.add('dragging'), 0); };
            const handleDragEnd = (e) => e.target.classList.remove('dragging');
            const handleDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };

            const handleDrop = async (e, targetItem) => {
                e.preventDefault();
                // Admin can override timeline lock
                if ((appSettings.isTimelineLocked && !isAdmin) || isGuest) return;
                const sourceId = e.dataTransfer.getData('sourceId');
                if (!sourceId || sourceId === targetItem.id) return; 

                const sourceItem = gallery.find(img => img.id === sourceId);
                if (!sourceItem || sourceItem.context !== targetItem.context) return; 

                const { doc, setDoc } = window.firebaseHooks;
                let sTime = sourceItem.createdAt, tTime = targetItem.createdAt;
                if (sTime === tTime) sTime += 1;

                try {
                    await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'gallery', sourceItem.id), { createdAt: tTime, colSpan: targetItem.colSpan }, { merge: true });
                    await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'gallery', targetItem.id), { createdAt: sTime, colSpan: sourceItem.colSpan }, { merge: true });
                } catch (error) { setCustomDialog({ title: "Lỗi", message: "Không thể hoán đổi.", type: "alert" }); }
            };

            const handleLockTimeline = () => {
                if (isGuest) return;
                setCustomDialog({
                    title: "Chốt vĩnh viễn Kỷ Yếu?",
                    message: "Khi chốt, sẽ KHÔNG MỘT AI có thể thêm mới hay xóa ảnh nữa. Bạn chắc chắn chứ?",
                    type: "confirm",
                    onConfirm: async () => {
                        const { doc, setDoc } = window.firebaseHooks;
                        try { await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'app_settings', 'config'), { isTimelineLocked: true }, { merge: true }); } 
                        catch (error) { setCustomDialog({ title: "Lỗi", message: "Không thể khóa.", type: "alert" }); }
                    }
                });
            };

            const handleUnlockTimeline = () => {
                setCustomDialog({
                    title: "Mở khóa Kỷ Yếu?",
                    message: "Hành động này sẽ cho phép mọi người tiếp tục đăng ảnh/chỉnh sửa. Xác nhận mở khóa?",
                    type: "confirm",
                    onConfirm: async () => {
                        const { doc, setDoc } = window.firebaseHooks;
                        try { await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'app_settings', 'config'), { isTimelineLocked: false }, { merge: true }); } 
                        catch (error) { setCustomDialog({ title: "Lỗi", message: "Không thể mở khóa.", type: "alert" }); }
                    }
                });
            };

            const handleSaveProfile = async (actionType = 'save') => {
                if (isGuest) return;
                if (!editForm.facebook || editForm.facebook.trim() === '') {
                    setCustomDialog({ title: "Thiếu thông tin", message: "Vui lòng nhập Link Facebook của bạn để lớp giữ liên lạc nhé!", type: "alert" });
                    return;
                }

                if (actionType === 'create_pin') {
                    setPinConfig({ show: true, mode: 'create', error: '' });
                    setPinInput1('');
                    return;
                }

                const { doc, setDoc } = window.firebaseHooks;
                setIsUploading(true);
                try {
                    const shouldBeLocked = !!selectedMember.pin || !!editForm.pin;

                    const finalDataToSave = {
                        ...editForm,
                        name: selectedMember.name, 
                        isLocked: shouldBeLocked 
                    };
                    
                    await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'members', editForm.id), finalDataToSave, { merge: true });
                    
                    if (shouldBeLocked) {
                        const newUnlockedSet = new Set(sessionUnlockedMembers);
                        newUnlockedSet.delete(selectedMember.id);
                        setSessionUnlockedMembers(newUnlockedSet);
                    }

                    setIsEditing(false);
                    if (tutorialStep === 4) setTutorialStep(0);
                    
                    if(shouldBeLocked) {
                        setCustomDialog({ title: "Thành công", message: "Thông tin đã được lưu và hệ thống tự động khóa lại an toàn.", type: "alert" });
                    }

                } catch (error) {
                    setCustomDialog({ title: "Lỗi", message: "Không thể lưu.", type: "alert" });
                } finally { setIsUploading(false); }
            };

            const handleForgotPin = async () => {
                if (!selectedMember) return;
                setCustomDialog({
                    title: "Quên Mã PIN?",
                    message: "Yêu cầu khôi phục mã PIN sẽ được gửi tới Admin. Bạn có chắc chắn muốn gửi không?",
                    type: "confirm",
                    onConfirm: async () => {
                        const { doc, setDoc } = window.firebaseHooks;
                        try {
                            await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'members', selectedMember.id), { pinResetState: 'requested' }, { merge: true });
                            setCustomDialog({ title: "Đã gửi yêu cầu", message: "Yêu cầu của bạn đã được gửi. Vui lòng chờ Admin duyệt, bạn sẽ nhận được thông báo ngay tại đây!", type: "alert" });
                            setPinConfig({ show: false, mode: '', error: '' });
                        } catch (e) {
                            setCustomDialog({ title: "Lỗi", message: "Không thể gửi yêu cầu.", type: "alert" });
                        }
                    }
                });
            };

            const handleApproveReset = async (memberId) => {
                const { doc, setDoc } = window.firebaseHooks;
                try {
                    await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'members', memberId), { pinResetState: 'approved' }, { merge: true });
                } catch (e) {
                    setCustomDialog({ title: "Lỗi", message: "Không thể duyệt yêu cầu.", type: "alert" });
                }
            };

            const handlePinSubmit = async (e) => {
                e.preventDefault();
                const { mode } = pinConfig;
                const { doc, setDoc } = window.firebaseHooks;

                if (mode === 'create') {
                    if (pinInput1.length !== 6) {
                        setPinConfig(prev => ({ ...prev, error: 'Mã PIN phải có đủ 6 chữ số!' }));
                        return;
                    }
                    setIsUploading(true);
                    try {
                        const encodedPin = btoa(pinInput1); 
                        const finalDataToSave = {
                            ...editForm,
                            name: selectedMember.name,
                            pin: encodedPin,
                            isLocked: true
                        };
                        await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'members', editForm.id), finalDataToSave, { merge: true });
                        setPinConfig({ show: false, mode: '', error: '' });
                        setIsEditing(false);
                        setCustomDialog({ title: "Đã chốt an toàn!", message: "Hồ sơ của bạn đã được khóa lại bằng Mã PIN. Vui lòng ghi nhớ mã này nhé.", type: "alert" });
                    } catch (error) {
                        setPinConfig(prev => ({ ...prev, error: 'Lỗi khi lưu mã PIN.' }));
                    } finally { setIsUploading(false); }
                } 
                else if (mode === 'unlock') {
                    if (pinInput1.length !== 6) {
                        setPinConfig(prev => ({ ...prev, error: 'Mã PIN gồm 6 số.' }));
                        return;
                    }
                    const storedPin = atob(selectedMember.pin);
                    if (pinInput1 === storedPin) {
                        setSessionUnlockedMembers(prev => new Set(prev).add(selectedMember.id));
                        setPinConfig({ show: false, mode: '', error: '' });
                        setIsEditing(true);
                    } else {
                        setPinConfig(prev => ({ ...prev, error: 'Mã PIN không chính xác!' }));
                    }
                }
                else if (mode === 'change') {
                    const storedPin = atob(selectedMember.pin);
                    if (pinInput1 !== storedPin) {
                        setPinConfig(prev => ({ ...prev, error: 'Mã PIN CŨ không chính xác!' }));
                        return;
                    }
                    if (pinInput2.length !== 6) {
                        setPinConfig(prev => ({ ...prev, error: 'Mã PIN MỚI phải gồm 6 số!' }));
                        return;
                    }
                    if (pinInput2 !== pinInput3) {
                        setPinConfig(prev => ({ ...prev, error: 'Xác nhận mã PIN mới không khớp!' }));
                        return;
                    }
                    
                    setIsUploading(true);
                    try {
                        const encodedNewPin = btoa(pinInput2);
                        await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'members', selectedMember.id), { pin: encodedNewPin }, { merge: true });
                        setPinConfig({ show: false, mode: '', error: '' });
                        setCustomDialog({ title: "Thành công", message: "Đã đổi Mã PIN thành công!", type: "alert" });
                    } catch (error) {
                        setPinConfig(prev => ({ ...prev, error: 'Lỗi khi đổi mã PIN.' }));
                    } finally { setIsUploading(false); }
                }
                else if (mode === 'reset_approved') {
                    if (pinInput1.length !== 6) {
                        setPinConfig(prev => ({ ...prev, error: 'Mã PIN MỚI phải gồm 6 số!' }));
                        return;
                    }
                    if (pinInput1 !== pinInput2) {
                        setPinConfig(prev => ({ ...prev, error: 'Xác nhận mã PIN không khớp!' }));
                        return;
                    }
                    
                    setIsUploading(true);
                    try {
                        const encodedNewPin = btoa(pinInput1);
                        await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'members', selectedMember.id), { pin: encodedNewPin, isLocked: true, pinResetState: 'none' }, { merge: true });
                        setPinConfig({ show: false, mode: '', error: '' });
                        // Cho phép sửa ngay
                        setSessionUnlockedMembers(prev => new Set(prev).add(selectedMember.id));
                        setIsEditing(true);
                        setCustomDialog({ title: "Tuyệt vời", message: "Đã lưu mã PIN mới thành công. Bạn có thể tiếp tục sửa hồ sơ!", type: "alert" });
                    } catch (error) {
                        setPinConfig(prev => ({ ...prev, error: 'Lỗi khi lưu mã PIN.' }));
                    } finally { setIsUploading(false); }
                }
            };

            const handleAdminResetPin = () => {
                setCustomDialog({
                    title: "Admin: Gỡ Mã PIN",
                    message: `Bạn có chắc chắn muốn gỡ khóa bảo vệ của [${selectedMember.name}] không?`,
                    type: "confirm",
                    onConfirm: async () => {
                        const { doc, setDoc } = window.firebaseHooks;
                        try {
                            await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'members', selectedMember.id), { pin: null, isLocked: false, pinResetState: 'none' }, { merge: true });
                            setCustomDialog({ title: "Thành công", message: "Đã gỡ mã PIN cho hồ sơ này.", type: "alert" });
                        } catch(e) {
                            setCustomDialog({ title: "Lỗi", message: "Không thể gỡ mã PIN.", type: "alert" });
                        }
                    }
                });
            };

            const handleLeaveMessage = async (e) => {
                e.preventDefault();
                if (!selectedMember || isGuest) return;
                const author = e.target.author.value.trim(), content = e.target.content.value.trim();
                if (!author || !content) return;
                const { doc, setDoc } = window.firebaseHooks;
                setIsUploading(true);
                try {
                    const newMessage = { id: Date.now(), author, content, date: new Date().toLocaleDateString('vi-VN') };
                    await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'members', selectedMember.id), { messages: [newMessage, ...(selectedMember.messages || [])] }, { merge: true });
                    e.target.reset();
                } catch (error) { setCustomDialog({ title: "Lỗi", message: "Không thể gửi lời nhắn.", type: "alert" }); } 
                finally { setIsUploading(false); }
            };

            const handleDeleteMessage = (msgId) => {
                setCustomDialog({
                    title: "Admin: Xóa Lời Nhắn",
                    message: "Xóa vĩnh viễn lời nhắn này khỏi hệ thống?",
                    type: "confirm",
                    onConfirm: async () => {
                        const { doc, setDoc } = window.firebaseHooks;
                        try {
                            const newMessages = selectedMember.messages.filter(m => m.id !== msgId);
                            await setDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'members', selectedMember.id), { messages: newMessages }, { merge: true });
                        } catch(e) {
                            setCustomDialog({ title: "Lỗi", message: "Không thể xóa lời nhắn.", type: "alert" });
                        }
                    }
                });
            };

            const saveMediaToFirebase = async () => {
                if (!mediaForm.url || (appSettings.isTimelineLocked && !isAdmin) || isGuest) return;
                const { collection, addDoc } = window.firebaseHooks;
                setIsUploading(true);
                try {
                    await addDoc(collection(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'gallery'), { 
                        type: mediaForm.type, url: mediaForm.url, caption: mediaForm.caption, 
                        grade: mediaForm.grade, context: mediaForm.context || 'general', 
                        uploaderUid: currentUser?.uid, createdAt: Date.now(), colSpan: Math.random() > 0.6 ? 'col-span-2' : 'col-span-1' 
                    });
                    setShowAddMedia(false);
                    setMediaForm({ type: 'image', url: '', caption: '', grade: '12A3', context: 'general' });
                } catch (error) { setCustomDialog({ title: "Lỗi", message: "Không thể đăng.", type: "alert" }); } 
                finally { setIsUploading(false); }
            };

            const handleDeleteMedia = (e, id) => {
                e.stopPropagation(); 
                if ((appSettings.isTimelineLocked && !isAdmin) || isGuest) return;
                setCustomDialog({
                    title: isAdmin ? "Admin: Xóa kỷ niệm" : "Xóa kỷ niệm?", 
                    message: "Bạn có chắc chắn muốn gỡ bức ảnh/video này khỏi kỷ yếu không?", 
                    type: "confirm",
                    onConfirm: async () => { const { doc, deleteDoc } = window.firebaseHooks; await deleteDoc(doc(window.firebaseDB, 'artifacts', appId, 'public', 'data', 'gallery', id)); }
                });
            };

            const getSlideStyle = (index) => {
                const isActive = currentSlide === index;
                const isPast = currentSlide > index;
                return {
                    position: 'absolute', inset: 0,
                    transition: 'all 0.9s cubic-bezier(0.19, 1, 0.22, 1)',
                    opacity: isActive ? 1 : 0,
                    transform: isActive ? 'translateX(0) scale(1) rotateY(0deg)' : isPast ? 'translateX(-15%) scale(0.92) rotateY(5deg)' : 'translateX(15%) scale(1.08) rotateY(-5deg)',
                    zIndex: isActive ? 20 : 10,
                    pointerEvents: isActive ? 'auto' : 'none',
                    filter: isActive ? 'blur(0px)' : 'blur(15px)',
                    transformOrigin: 'center'
                };
            };

            const startQuiz = (role) => {
                const pool = role === 'member' ? MEMBER_QUESTIONS : GUEST_QUESTIONS;
                const shuffled = [...pool].sort(() => 0.5 - Math.random()).slice(0, 5);
                const processed = shuffled.map(q => ({
                    ...q,
                    options: [...q.a].sort(() => 0.5 - Math.random())
                }));
                
                setQuizQuestions(processed);
                setCurrentQIndex(0);
                setQuizScore(0);
                setQuizRole(role);
                setAuthView('quiz');
            };

            const handleOptionClick = (isCorrect) => {
                const newScore = isCorrect ? quizScore + 1 : quizScore;
                setQuizScore(newScore);

                if (currentQIndex < 4) {
                    setCurrentQIndex(prev => prev + 1);
                } else {
                    setAuthView('loading');
                    setTimeout(() => {
                        const isPass = newScore >= 4;
                        setQuizPassed(isPass);
                        setAuthView('result');
                    }, 3000); 
                }
            };

            const finalizeAuth = () => {
                localStorage.setItem('kyyeu_userRole', quizRole);
                setUserRole(quizRole);
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPass === 'admin12a3') {
                    localStorage.setItem('kyyeu_userRole', 'admin');
                    setUserRole('admin');
                    setAuthView('select');
                    setShowDashboard(true);
                } else {
                    setAuthError('Mã Master không chính xác!');
                }
            };

            // MÀN HÌNH ADMIN (BẢNG ĐIỀU KHIỂN ĐƠN GIẢN)
            if (isAdmin && showDashboard) {
                return (
                    <div className="h-[100dvh] w-full bg-slate-50 font-sans text-slate-800 p-3 md:p-8 overflow-y-auto relative custom-scrollbar pb-24">
                        <div className="max-w-7xl mx-auto space-y-5 md:space-y-8">
                            
                            {/* HEADER */}
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 gap-4 sm:gap-0">
                                <div>
                                    <h1 className="text-2xl md:text-3xl font-bold flex items-center gap-3 text-indigo-600 tracking-tight">
                                        <div className="w-10 h-10 md:w-12 md:h-12 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600 shadow-inner">
                                            <i className="fa-solid fa-screwdriver-wrench"></i>
                                        </div>
                                        Bảng Điều Khiển
                                    </h1>
                                    <p className="text-xs md:text-sm text-slate-500 mt-2 font-medium">Quản trị viên Kỷ Yếu 12A3</p>
                                </div>
                                <div className="flex gap-3 w-full sm:w-auto">
                                    <button onClick={() => setShowDashboard(false)} className="flex-1 sm:flex-none justify-center px-4 py-3 md:px-6 md:py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold text-xs md:text-sm transition-all shadow-md hover:shadow-lg flex items-center gap-2">
                                        <i className="fa-solid fa-arrow-right-to-bracket"></i> Tới Kỷ Yếu
                                    </button>
                                    <button onClick={() => { 
                                        localStorage.removeItem('kyyeu_userRole'); 
                                        setUserRole(null); 
                                        setAuthView('select'); 
                                        setSessionUnlockedMembers(new Set()); 
                                    }} className="flex-1 sm:flex-none justify-center px-4 py-3 md:px-5 md:py-3 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-xl font-bold text-xs md:text-sm transition-all shadow-sm border border-rose-200 flex items-center gap-2">
                                        <i className="fa-solid fa-right-from-bracket"></i> Thoát
                                    </button>
                                </div>
                            </div>

                            {/* THỐNG KÊ (STATS) */}
                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                <div className="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4 hover:shadow-md transition-shadow cursor-default">
                                    <div className="w-12 h-12 bg-sky-100 text-sky-500 rounded-xl flex items-center justify-center text-xl shrink-0"><i className="fa-solid fa-users"></i></div>
                                    <div><p className="text-[10px] uppercase font-bold tracking-widest text-slate-400 mb-1">Tổng Sĩ Số</p><p className="text-2xl font-black text-slate-800">{stats.totalMembers}</p></div>
                                </div>
                                <div className="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4 hover:shadow-md transition-shadow cursor-default">
                                    <div className="w-12 h-12 bg-emerald-100 text-emerald-500 rounded-xl flex items-center justify-center text-xl shrink-0"><i className="fa-solid fa-lock"></i></div>
                                    <div><p className="text-[10px] uppercase font-bold tracking-widest text-slate-400 mb-1">Đã Chốt PIN</p><p className="text-2xl font-black text-slate-800">{stats.lockedMembers}</p></div>
                                </div>
                                <div className="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4 hover:shadow-md transition-shadow cursor-default">
                                    <div className="w-12 h-12 bg-rose-100 text-rose-500 rounded-xl flex items-center justify-center text-xl shrink-0"><i className="fa-solid fa-images"></i></div>
                                    <div><p className="text-[10px] uppercase font-bold tracking-widest text-slate-400 mb-1">Kho Ảnh/Video</p><p className="text-2xl font-black text-slate-800">{stats.totalMedia}</p></div>
                                </div>
                                <div className="bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-slate-200 flex items-center gap-4 hover:shadow-md transition-shadow cursor-default">
                                    <div className="w-12 h-12 bg-amber-100 text-amber-500 rounded-xl flex items-center justify-center text-xl shrink-0"><i className="fa-solid fa-comments"></i></div>
                                    <div><p className="text-[10px] uppercase font-bold tracking-widest text-slate-400 mb-1">Tổng Lời Nhắn</p><p className="text-2xl font-black text-slate-800">{stats.totalMessages}</p></div>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-3 gap-5 md:gap-6">
                                {/* CỘT TRÁI */}
                                <div className="space-y-5 md:space-y-6 lg:col-span-1">
                                    
                                    {/* CÀI ĐẶT HỆ THỐNG */}
                                    <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200">
                                        <h2 className="text-lg font-bold mb-4 md:mb-5 flex items-center gap-3 text-slate-800">
                                            <div className="w-8 h-8 bg-slate-100 rounded-lg flex items-center justify-center text-slate-600"><i className="fa-solid fa-server"></i></div>
                                            Hệ Thống
                                        </h2>
                                        <div className="p-4 rounded-2xl border border-slate-100 flex items-center justify-between bg-slate-50 hover:bg-slate-100 transition-colors cursor-pointer" onClick={() => {
                                            if(appSettings.isTimelineLocked) handleUnlockTimeline();
                                            else handleLockTimeline();
                                        }}>
                                            <div>
                                                <p className="text-sm font-bold text-slate-800">Niêm Phong Kỷ Yếu</p>
                                                <p className="text-[10px] md:text-xs text-slate-500 mt-1">{appSettings.isTimelineLocked ? 'Đang khóa (Không cho đăng)' : 'Cho phép đăng tải'}</p>
                                            </div>
                                            <div className={`w-14 h-7 rounded-full relative transition-colors shadow-inner flex items-center shrink-0 ${appSettings.isTimelineLocked ? 'bg-emerald-500' : 'bg-slate-300'}`}>
                                                <div className={`absolute left-1 w-5 h-5 bg-white rounded-full transition-transform shadow-sm ${appSettings.isTimelineLocked ? 'translate-x-7' : 'translate-x-0'}`}></div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* YÊU CẦU ĐỔI PIN */}
                                    <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col max-h-[400px]">
                                        <h2 className="text-lg font-bold mb-4 flex items-center gap-3 text-slate-800 shrink-0">
                                            <div className="w-8 h-8 bg-amber-100 rounded-lg flex items-center justify-center text-amber-500"><i className="fa-solid fa-key"></i></div>
                                            Yêu Cầu Cấp PIN
                                            {members.filter(m => m.pinResetState === 'requested').length > 0 && (
                                                <span className="bg-rose-500 text-white text-[10px] px-2 py-0.5 rounded-full ml-auto animate-pulse">
                                                    {members.filter(m => m.pinResetState === 'requested').length}
                                                </span>
                                            )}
                                        </h2>
                                        <div className="space-y-3 overflow-y-auto pr-2 custom-scrollbar flex-1">
                                            {members.filter(m => m.pinResetState === 'requested').length === 0 ? (
                                                <div className="flex flex-col items-center justify-center h-32 text-slate-400">
                                                    <i className="fa-regular fa-circle-check text-3xl mb-2 opacity-50"></i>
                                                    <p className="text-xs">Không có yêu cầu nào</p>
                                                </div>
                                            ) : (
                                                members.filter(m => m.pinResetState === 'requested').map(req => (
                                                    <div key={req.id} className="flex justify-between items-center p-3 border border-amber-100 rounded-2xl bg-amber-50/30 hover:bg-amber-50 transition-colors">
                                                        <div className="flex items-center gap-3 min-w-0">
                                                            <img src={req.avatar} className="w-10 h-10 rounded-full border-2 border-white shadow-sm object-cover shrink-0" />
                                                            <div className="min-w-0">
                                                                <div className="text-xs md:text-sm font-bold text-slate-800 truncate">{req.name.split(' ').slice(-2).join(' ')}</div>
                                                                <div className="text-[10px] text-amber-500 font-medium mt-0.5 flex items-center gap-1"><i className="fa-solid fa-clock"></i> Chờ duyệt</div>
                                                            </div>
                                                        </div>
                                                        <button onClick={() => handleApproveReset(req.id)} className="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold rounded-xl transition-all hover:scale-105 shadow-sm hover:shadow flex items-center gap-1.5 shrink-0 ml-2">
                                                            <i className="fa-solid fa-check"></i> Duyệt
                                                        </button>
                                                    </div>
                                                ))
                                            )}
                                        </div>
                                    </div>
                                </div>

                                {/* CỘT GIỮA VÀ PHẢI */}
                                <div className="lg:col-span-2 space-y-5 md:space-y-6">
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5 md:gap-6">
                                        {/* QUẢN LÝ THÀNH VIÊN */}
                                        <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col h-[400px]">
                                            <h2 className="text-lg font-bold mb-4 flex items-center gap-3 text-slate-800 shrink-0">
                                                <div className="w-8 h-8 bg-sky-100 rounded-lg flex items-center justify-center text-sky-500"><i className="fa-solid fa-users"></i></div>
                                                Thành Viên Kỷ Yếu ({members.length})
                                            </h2>
                                            <div className="space-y-2 overflow-y-auto pr-2 custom-scrollbar flex-1 pb-4">
                                                {members.map((member, i) => (
                                                    <div key={member.id} className="flex items-center justify-between p-2.5 border border-slate-100 rounded-xl bg-white hover:bg-slate-50 transition-colors group">
                                                        <div className="flex items-center gap-3 min-w-0">
                                                            <div className="relative shrink-0">
                                                                <img src={member.avatar} className="w-10 h-10 rounded-full object-cover border border-slate-200" />
                                                                {member.isLocked ? (
                                                                    <div className="absolute -bottom-1 -right-1 bg-emerald-500 text-white text-[8px] w-4 h-4 flex items-center justify-center rounded-full"><i className="fa-solid fa-lock"></i></div>
                                                                ) : (
                                                                    <div className="absolute -bottom-1 -right-1 bg-slate-300 text-white text-[8px] w-4 h-4 flex items-center justify-center rounded-full"><i className="fa-solid fa-unlock"></i></div>
                                                                )}
                                                            </div>
                                                            <div className="min-w-0">
                                                                <p className="text-xs font-bold text-slate-800 truncate" title={member.name}>{member.name}</p>
                                                                <p className="text-[9px] text-slate-500">{member.role}</p>
                                                            </div>
                                                        </div>
                                                        {/* Nút Bẻ Khóa Nhanh */}
                                                        {member.isLocked && (
                                                            <button onClick={() => handleForceResetPinDashboard(member.id, member.name)} className="w-8 h-8 rounded-lg bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white flex items-center justify-center transition-colors shadow-sm shrink-0 opacity-100 md:opacity-0 group-hover:opacity-100" title="Bẻ khóa hồ sơ">
                                                                <i className="fa-solid fa-unlock-keyhole text-[10px]"></i>
                                                            </button>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {/* QUẢN LÝ LỜI NHẮN TOÀN CỤC */}
                                        <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col h-[400px]">
                                            <h2 className="text-lg font-bold mb-4 flex items-center gap-3 text-slate-800 shrink-0">
                                                <div className="w-8 h-8 bg-purple-100 rounded-lg flex items-center justify-center text-purple-500"><i className="fa-solid fa-comments"></i></div>
                                                Bình Luận Mới Nhất
                                            </h2>
                                            <div className="space-y-3 overflow-y-auto pr-2 custom-scrollbar flex-1 pb-4">
                                                {allMessages.length === 0 ? (
                                                    <div className="flex flex-col items-center justify-center h-full text-slate-400">
                                                        <i className="fa-regular fa-comment text-3xl mb-2 opacity-50"></i>
                                                        <p className="text-xs">Chưa có bình luận nào</p>
                                                    </div>
                                                ) : (
                                                    allMessages.slice(0, 50).map(msg => ( 
                                                        <div key={`${msg.ownerId}_${msg.id}`} className="p-3 border border-slate-100 rounded-xl bg-slate-50 hover:bg-purple-50/50 transition-colors group">
                                                            <div className="flex justify-between items-start mb-1">
                                                                <p className="text-[10px] font-bold text-slate-600"><i className="fa-solid fa-user-pen text-slate-400"></i> {msg.author}</p>
                                                                <button onClick={() => handleAdminDeleteMessageGlobal(msg.ownerId, msg.id)} className="text-rose-400 hover:text-rose-600 opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity"><i className="fa-solid fa-trash-can text-[10px]"></i></button>
                                                            </div>
                                                            <p className="text-xs text-slate-800 font-serif italic mb-1.5 leading-relaxed break-words line-clamp-3">"{msg.content}"</p>
                                                            <div className="flex justify-between items-center text-[9px] text-slate-400 border-t border-slate-200/60 pt-1.5">
                                                                <span className="uppercase tracking-wider font-semibold">Tới: <span className="text-indigo-500">{msg.ownerName.split(' ').slice(-2).join(' ')}</span></span>
                                                                <span>{msg.date}</span>
                                                            </div>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    {/* QUẢN LÝ KHO ẢNH */}
                                    <div className="bg-white p-4 md:p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col max-h-[600px]">
                                        <div className="flex justify-between items-center mb-4 md:mb-5 shrink-0">
                                            <h2 className="text-lg font-bold flex items-center gap-3 text-slate-800">
                                                <div className="w-8 h-8 bg-rose-100 rounded-lg flex items-center justify-center text-rose-500"><i className="fa-solid fa-images"></i></div>
                                                Kiểm Duyệt Kho Ảnh ({gallery.length})
                                            </h2>
                                        </div>
                                        <div className="grid grid-cols-2 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-3 overflow-y-auto pr-2 custom-scrollbar flex-1 pb-4">
                                            {gallery.map(item => (
                                                <div key={item.id} className="relative group aspect-square rounded-2xl overflow-hidden border border-slate-200 bg-slate-100 shadow-sm">
                                                    {item.type === 'image' ? (
                                                        <img src={item.url} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
                                                    ) : (
                                                        <div className="w-full h-full flex items-center justify-center bg-slate-800 text-white transition-transform duration-500 group-hover:scale-110"><i className="fa-solid fa-video text-2xl"></i></div>
                                                    )}
                                                    
                                                    {/* Overlay */}
                                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-100 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex flex-col justify-end p-3 z-10">
                                                        <p className="text-white text-[10px] truncate mb-2">{item.caption || 'Không có chú thích'}</p>
                                                        <button onClick={(e) => handleDeleteMedia(e, item.id)} className="w-full py-1.5 bg-rose-500 hover:bg-rose-600 text-white rounded-lg text-xs font-bold transition-transform hover:scale-105 shadow-md flex items-center justify-center gap-1.5">
                                                            <i className="fa-solid fa-trash-can"></i> Xóa
                                                        </button>
                                                    </div>
                                                    
                                                    <div className="absolute top-2 left-2 bg-white/90 text-slate-800 font-bold text-[9px] px-2 py-1 rounded-md shadow-sm z-0 backdrop-blur-md uppercase tracking-wider">{item.grade}</div>
                                                    {item.type === 'video' && <div className="absolute top-2 right-2 bg-rose-500 text-white text-[9px] w-6 h-6 flex items-center justify-center rounded-full shadow-sm z-0"><i className="fa-solid fa-play"></i></div>}
                                                </div>
                                            ))}
                                            {gallery.length === 0 && (
                                                <div className="col-span-full flex flex-col items-center justify-center py-16 text-slate-400">
                                                    <i className="fa-regular fa-image text-4xl mb-3 opacity-50"></i>
                                                    <p className="text-sm font-medium">Chưa có ảnh nào trong kho</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                </div>
                            </div>
                        </div>

                        {customDialog && (
                            <div className="fixed inset-0 z-[3000] flex items-center justify-center p-4 bg-slate-900/40 backdrop-blur-sm animate-fadeIn">
                                <div className="bg-white rounded-3xl w-full max-w-sm shadow-2xl overflow-hidden border border-white animate-slideUp">
                                    <div className="p-6 text-center">
                                        <h3 className="text-xl font-bold text-slate-800 mb-2">{customDialog.title}</h3>
                                        <p className="text-sm text-slate-500 leading-relaxed">{customDialog.message}</p>
                                    </div>
                                    <div className="flex border-t border-slate-100 p-3 gap-3 bg-slate-50">
                                        {customDialog.type === 'confirm' && <button onClick={() => setCustomDialog(null)} className="flex-1 py-3 bg-white border border-slate-200 text-slate-600 rounded-xl text-sm font-bold hover:bg-slate-100 transition-colors shadow-sm">Hủy</button>}
                                        <button onClick={() => { if (customDialog.onConfirm) customDialog.onConfirm(); setCustomDialog(null); }} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl text-sm font-bold hover:bg-indigo-700 shadow-md transition-colors">Xác nhận</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            // MÀN HÌNH CHỌN QUYỀN TRUY CẬP BAN ĐẦU 
            if (userRole === null) {
                return (
                    <div className="fixed inset-0 z-[9999] bg-[#fdfbfb] flex flex-col items-center justify-center p-4">
                        <div className="absolute inset-0 z-0 opacity-40 pointer-events-none" style={{ backgroundImage: 'radial-gradient(#f43f5e 1px, transparent 1px)', backgroundSize: '40px 40px' }}></div>
                        
                        <div className="bg-white/90 backdrop-blur-xl border border-rose-100 rounded-[2rem] p-6 md:p-12 shadow-2xl max-w-lg w-full z-10 animate-slideUp text-center relative overflow-hidden">
                            <div className="absolute -top-10 -right-10 w-32 h-32 bg-rose-200 rounded-full blur-3xl opacity-50"></div>
                            <div className="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-200 rounded-full blur-3xl opacity-50"></div>
                            
                            {authView === 'select' && (
                                <>
                                    <div className="w-20 h-20 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-inner border border-rose-200 relative z-10">
                                        <i className="fa-solid fa-graduation-cap"></i>
                                    </div>
                                    <h1 className="text-3xl md:text-4xl font-serif text-gray-800 mb-2 relative z-10">Chào mừng bạn!</h1>
                                    <p className="text-sm text-gray-500 mb-8 relative z-10">Hệ thống bảo vệ kỷ niệm đã được kích hoạt.</p>
                                    
                                    <div className="space-y-4 relative z-10">
                                        <button onClick={() => startQuiz('member')} className="w-full py-4 bg-gradient-to-r from-rose-400 to-rose-500 text-white rounded-2xl font-bold shadow-md hover:shadow-lg hover:-translate-y-1 transition-all flex flex-col items-center justify-center gap-1 group">
                                            <span className="flex items-center gap-2 text-base"><i className="fa-solid fa-shield-halved"></i> Xác Thực Thành Viên 12A3</span>
                                            <span className="text-[10px] opacity-80 font-normal uppercase tracking-widest">Kiểm tra độ am hiểu về lớp</span>
                                        </button>
                                        
                                        <button onClick={() => startQuiz('guest')} className="w-full py-4 bg-gray-100 text-gray-700 hover:bg-gray-200 border border-gray-200 rounded-2xl font-bold transition-all flex flex-col items-center justify-center gap-1">
                                            <span className="flex items-center gap-2 text-base"><i className="fa-solid fa-eye"></i> Xác Thực Khách Tham Quan</span>
                                            <span className="text-[10px] text-gray-500 font-normal uppercase tracking-widest">Bài kiểm tra độ an toàn</span>
                                        </button>
                                    </div>

                                    <div className="mt-8 relative z-10">
                                        <button onClick={() => { setAuthView('admin'); setAuthError(''); setAdminPass(''); }} className="text-[10px] text-gray-400 hover:text-rose-500 uppercase tracking-widest font-bold transition-colors flex items-center justify-center w-full gap-1">
                                            <i className="fa-solid fa-key"></i> Đăng nhập Quản Trị
                                        </button>
                                    </div>
                                </>
                            )}

                            {authView === 'admin' && (
                                <form onSubmit={handleAdminLogin} className="relative z-10 animate-fadeIn text-left">
                                    <h3 className="font-bold text-gray-800 mb-2 text-center text-xl">Quản Trị Tối Cao</h3>
                                    <p className="text-xs text-gray-500 mb-6 text-center">Nhập mật mã Master để truy cập toàn quyền quản lý hệ thống kỷ yếu.</p>
                                    
                                    <div className="mb-4">
                                        <input type="password" value={adminPass} onChange={e=>setAdminPass(e.target.value)} placeholder="Nhập Master PIN..." className="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl text-center text-sm tracking-[0.2em] outline-none focus:border-rose-400 focus:bg-white transition-colors font-mono font-bold" autoFocus required/>
                                    </div>

                                    {authError && <p className="text-xs text-rose-500 mb-3 font-medium animate-bounce text-center"><i className="fa-solid fa-triangle-exclamation"></i> {authError}</p>}
                                    
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => {setAuthView('select'); setAdminPass(''); setAuthError('');}} className="flex-1 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold hover:bg-gray-200 transition-colors text-sm">Quay lại</button>
                                        <button type="submit" className="flex-1 py-3 bg-rose-500 text-white rounded-xl font-bold shadow-md hover:bg-rose-600 transition-colors text-sm">Truy Cập</button>
                                    </div>
                                </form>
                            )}

                            {authView === 'quiz' && quizQuestions.length > 0 && (
                                <div className="relative z-10 text-left animate-fadeIn">
                                    <div className="flex justify-between items-center mb-4">
                                        <span className="text-xs font-bold text-rose-500 uppercase tracking-widest bg-rose-50 px-3 py-1 rounded-full border border-rose-100">
                                            {quizRole === 'member' ? 'Dành cho Lớp' : 'Dành cho Khách'}
                                        </span>
                                        <span className="text-xs text-gray-500 font-medium">Câu {currentQIndex + 1}/5</span>
                                    </div>

                                    <div className="w-full h-2 bg-gray-100 rounded-full mb-6 overflow-hidden">
                                        <div className="h-full bg-rose-400 transition-all duration-300" style={{ width: `${((currentQIndex) / 5) * 100}%` }}></div>
                                    </div>

                                    <h3 className="font-serif text-lg md:text-xl text-gray-800 mb-6 leading-relaxed">
                                        {quizQuestions[currentQIndex].q}
                                    </h3>

                                    <div className="space-y-3">
                                        {quizQuestions[currentQIndex].options.map((opt, i) => (
                                            <button 
                                                key={i} 
                                                onClick={() => handleOptionClick(opt.c)}
                                                className="w-full text-left px-4 py-3 bg-white border border-gray-200 hover:border-rose-300 hover:bg-rose-50 rounded-xl text-sm text-gray-700 transition-all shadow-sm group"
                                            >
                                                <span className="inline-block w-6 font-bold text-rose-400 group-hover:text-rose-600">{String.fromCharCode(65 + i)}.</span> 
                                                {opt.t}
                                            </button>
                                        ))}
                                    </div>
                                    
                                    <div className="mt-6 text-center">
                                        <button onClick={() => setAuthView('select')} className="text-[10px] text-gray-400 hover:text-gray-600 uppercase tracking-widest underline underline-offset-4 font-medium transition-colors">Hủy & Quay lại</button>
                                    </div>
                                </div>
                            )}

                            {authView === 'loading' && (
                                <div className="relative z-10 py-10 flex flex-col items-center justify-center animate-fadeIn">
                                    <div className="w-16 h-16 border-4 border-gray-100 border-t-rose-500 rounded-full animate-spin mb-6"></div>
                                    <h3 className="text-xl font-bold text-gray-800 mb-2">Đang phân tích dữ liệu...</h3>
                                    <p className="text-sm text-gray-500 animate-pulse">Hệ thống AI đang đánh giá độ an toàn của bạn</p>
                                </div>
                            )}

                            {authView === 'result' && (
                                <div className="relative z-10 animate-fadeIn text-center">
                                    {quizPassed ? (
                                        <>
                                            <div className="w-24 h-24 bg-emerald-100 text-emerald-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-inner border border-emerald-200">
                                                <i className="fa-solid fa-check"></i>
                                            </div>
                                            <h3 className="text-2xl font-bold text-gray-800 mb-2">Xác thực thành công!</h3>
                                            <p className="text-sm text-gray-500 mb-6 px-4">Bạn đã trả lời đúng {quizScore}/5 câu. {quizRole === 'guest' ? 'Cảm ơn bạn đã cam kết tôn trọng kỷ niệm của lớp.' : 'Chào mừng thành viên 12A3 trở về nhà.'}</p>
                                            <button onClick={finalizeAuth} className="w-full py-4 bg-gradient-to-r from-emerald-400 to-emerald-500 text-white rounded-2xl font-bold shadow-md hover:shadow-lg hover:scale-105 transition-transform">
                                                Vào Xem Kỷ Yếu Ngay
                                            </button>
                                        </>
                                    ) : (
                                        <>
                                            <div className="w-24 h-24 bg-rose-100 text-rose-500 rounded-full flex items-center justify-center text-4xl mx-auto mb-6 shadow-inner border border-rose-200">
                                                <i className="fa-solid fa-xmark"></i>
                                            </div>
                                            <h3 className="text-2xl font-bold text-gray-800 mb-2">Xác thực thất bại</h3>
